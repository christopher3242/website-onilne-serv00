<!DOCTYPE html>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f0f0f0;
    padding: 20px;
  }
  h1 {
    text-align: center;
    margin-bottom: 10px;
    color: #2c3e50;
  }
  #quiz-container {
    background: #fff;
    max-width: 600px;
    margin: auto;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
  #question {
    font-size: 1.2em;
    margin-bottom: 10px;
  }
  #flag-img {
    width: 200px;
    height: auto;
    display: block;
    margin: 10px auto;
    border: 2px solid #ccc;
  }
  #buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }
  button {
    padding: 10px 15px;
    font-size: 1em;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    background: #3498db;
    color: #fff;
    transition: background 0.3s;
  }
  button:hover {
    background: #2980b9;
  }
  #score {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
  }
  #answer-text {
    text-align: center;
    margin-top: 10px;
    font-size: 1.1em;
    display: none;
    font-weight: bold;
  }
  .exit-link {
    display: inline-block;
    margin-bottom: 15px;
    text-decoration: none;
    color: #e74c3c;
    font-weight: bold;
  }
  .exit-link:hover {
    text-decoration: underline;
  }
  #show-answer-btn, #next-btn, #restart-btn {
    margin-top: 10px;
    display: block;
    margin-left: auto;
    margin-right: auto;
    padding: 8px 12px;
    border: none;
    border-radius: 5px;
    font-size: 1em;
    cursor: pointer;
  }
  #show-answer-btn {
    background-color: #2ecc71;
  }
  #show-answer-btn:hover {
    background-color: #27ae60;
  }
  #next-btn {
    background-color: #f39c12;
  }
  #next-btn:hover {
    background-color: #e67e22;
  }
  #restart-btn {
    background-color: #e67e22;
  }
  #restart-btn:hover {
    background-color: #d35400;
  }
</style>
</head>
<body>

<a href="../games.html" class="exit-link">Exit</a>

<div id="quiz-container">
  <div id="question"></div>
  <img id="flag-img" src="" alt="Country Flag"/>
  <div id="buttons"></div>
  <button id="show-answer-btn">Show Answer</button>
  <button id="next-btn">Next</button>
  <button id="restart-btn">Restart Quiz</button>
  <div id="answer-text"></div>

let score = 0;
let currentQuestion = {};

const questionElement = document.getElementById("question");
const flagImage = document.getElementById("flag-img");
const buttonsContainer = document.getElementById("buttons");
const scoreElement = document.getElementById("score");
const answerText = document.getElementById("answer-text");
const showAnswerBtn = document.getElementById("show-answer-btn");
const nextBtn = document.getElementById("next-btn");
const restartBtn = document.getElementById("restart-btn");

// Function to shuffle array
function shuffleArray(array) {
  for (let i = array.length -1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i +1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// Generate a question
function generateQuestion() {
  currentQuestion = questions[Math.floor(Math.random() * questions.length)];
  questionElement.textContent = "Which country's flag is this?";
  flagImage.src = currentQuestion.flag;
  answerText.style.display = "none"; // hide answer
  answerText.textContent = "";
}

function generateOptions() {
  // prepare options
  const options = [currentQuestion.country];
  const otherCountries = questions.filter(q => q.country !== currentQuestion.country);
  shuffleArray(otherCountries);
  for (let i = 0; i < 3; i++) {
    options.push(otherCountries[i].country);
  }
  shuffleArray(options);
  // display options as buttons
  buttonsContainer.innerHTML = "";
  options.forEach(option => {
    const btn = document.createElement("button");
    btn.textContent = option;
    btn.onclick = () => handleAnswer(option);
    buttonsContainer.appendChild(btn);
  });
}

// Handle answer
function handleAnswer(selected) {
  if (selected === currentQuestion.country) {
    alert("Correct!");
    score++;
  } else {
    alert(`Wrong! It was ${currentQuestion.country}`);
  }
  updateScore();
}

// Update score display
function updateScore() {
  scoreElement.textContent = `Score: ${score}`;
}

// Next button
nextBtn.addEventListener("click", () => {
  generateQuestion();
  generateOptions();
});

// Show answer
showAnswerBtn.addEventListener("click", () => {
  answerText.textContent = `Answer: ${currentQuestion.country}`;
  answerText.style.display = "block";
  setTimeout(() => {
    answerText.style.display = "none";
  }, 2000);
});

// Restart game
restartBtn.addEventListener("click", () => {
  score = 0;
  updateScore();
  generateQuestion();
  generateOptions();
});

// Initialize first question
generateQuestion();
generateOptions();
updateScore();

</script>
