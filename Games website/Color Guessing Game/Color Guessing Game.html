<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Color Guessing Game (With Score & Fixes)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f0f0f0;
      margin: 0;
      padding: 20px;
    }
    h1 {
      margin-bottom: 10px;
    }
    #colorCircle {
      width: 150px;
      height: 150px;
      margin: 20px auto;
      border-radius: 50%;
      border: 4px solid #333;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
    }
    #colorName {
      font-size: 1.5em;
      margin-top: 10px;
      font-weight: bold;
    }
    #scoreDisplay {
      font-size: 1.2em;
      margin-top: 10px;
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background-color: #4CAF50;
      color: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      transition: background-color 0.2s, transform 0.1s;
    }
    button:hover {
      background-color: #45a049;
      transform: scale(1.02);
    }
    #message {
      margin-top: 20px;
      font-size: 1.2em;
      min-height: 1.2em;
    }
    #controls {
      margin-top: 20px;
    }
    #resetBtn,
    #answerBtn,
    #exitBtn {
      margin: 10px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      border: none;
      background-color: #4CAF50;
      color: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      transition: background-color 0.2s;
    }
    #resetBtn:hover,
    #answerBtn:hover,
    #exitBtn:hover {
      background-color: #45a049;
    }
    /* Responsive adjustments */
    @media(max-width: 500px) {
      #colorCircle {
        width: 120px;
        height: 120px;
      }
      button {
        padding: 10px 20px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <h1>Guess the Color Name!</h1>
  <div id="colorCircle"></div>
  <div id="colorName">Color Name</div>
  <div id="scoreDisplay">Score: 0</div>
  <div class="buttons" id="choices" style="display: none;"></div>
  <div id="message"></div>
  <div id="controls">
    <button id="resetBtn">Start Game</button>
    <button id="answerBtn" style="display: none;">Answer</button>
    <a href="../games.html" style="text-decoration: none;">
      <button id="exitBtn">Exit</button>
    </a>
  </div>

  <script>
    const colorCircle = document.getElementById('colorCircle');
    const colorNameDiv = document.getElementById('colorName');
    const choicesDiv = document.getElementById('choices');
    const messageDiv = document.getElementById('message');
    const resetBtn = document.getElementById('resetBtn');
    const exitBtn = document.getElementById('exitBtn');
    const answerBtn = document.getElementById('answerBtn');
    const scoreDisplay = document.getElementById('scoreDisplay');

    const colorList = [
      { name: 'Red', hex: '#FF0000' },
      { name: 'Green', hex: '#008000' },
      { name: 'Blue', hex: '#0000FF' },
      { name: 'Yellow', hex: '#FFFF00' },
      { name: 'Orange', hex: '#FFA500' },
      { name: 'Purple', hex: '#800080' },
      { name: 'Pink', hex: '#FFC0CB' },
      { name: 'Brown', hex: '#A52A2A' },
      { name: 'Black', hex: '#000000' },
      { name: 'White', hex: '#FFFFFF' },
      { name: 'Gray', hex: '#808080' },
      { name: 'Cyan', hex: '#00FFFF' },
      { name: 'Magenta', hex: '#FF00FF' },
      { name: 'Lime', hex: '#00FF00' },
      { name: 'Maroon', hex: '#800000' },
      { name: 'Navy', hex: '#000080' },
      { name: 'Olive', hex: '#808000' },
      { name: 'Teal', hex: '#008080' },
      { name: 'Coral', hex: '#FF7F50' },
      { name: 'Turquoise', hex: '#40E0D0' },
      { name: 'Salmon', hex: '#FA8072' },
      { name: 'Khaki', hex: '#F0E68C' },
      { name: 'Violet', hex: '#EE82EE' },
      { name: 'Gold', hex: '#FFD700' },
      { name: 'Chocolate', hex: '#D2691E' },
      { name: 'Crimson', hex: '#DC143C' },
      { name: 'Indigo', hex: '#4B0082' },
      { name: 'Lavender', hex: '#E6E6FA' },
      { name: 'Plum', hex: '#DDA0DD' },
      { name: 'Silver', hex: '#C0C0C0' },
      { name: 'SkyBlue', hex: '#87CEEB' },
      { name: 'SteelBlue', hex: '#4682B4' },
      { name: 'DarkGreen', hex: '#006400' },
      { name: 'DarkOrange', hex: '#FF8C00' },
      { name: 'IndianRed', hex: '#CD5C5C' },
      { name: 'DarkMagenta', hex: '#8B008B' },
      { name: 'Peru', hex: '#CD853F' },
      { name: 'SlateGray', hex: '#708090' },
      { name: 'ForestGreen', hex: '#228B22' },
      // 20 additional colors
      { name: 'CoralPink', hex: '#F88379' },
      { name: 'DeepSkyBlue', hex: '#00BFFF' },
      { name: 'SpringGreen', hex: '#00FF7F' },
      { name: 'DarkViolet', hex: '#9400D3' },
      { name: 'LightSalmon', hex: '#FFA07A' },
      { name: 'RoyalBlue', hex: '#4169E1' },
      { name: 'DarkSlateGray', hex: '#2F4F4F' },
      { name: 'RosyBrown', hex: '#BC8F8F' },
      { name: 'MediumSlateBlue', hex: '#7B68EE' },
      { name: 'LightCoral', hex: '#F08080' },
      { name: 'OliveDrab', hex: '#6B8E23' },
      { name: 'DarkKhaki', hex: '#BDB76B' },
      { name: 'SlateBlue', hex: '#6A5ACD' },
      { name: 'DarkCyan', hex: '#008B8B' },
      { name: 'PinkBlush', hex: '#FFB6C1' },
      { name: 'Sienna', hex: '#A0522D' },
      { name: 'Tomato', hex: '#FF6347' },
      { name: 'FireBrick', hex: '#B22222' },
      { name: 'Peru', hex: '#CD853F' },
    ];

    let correctColor = null;
    let options = [];
    let score = 0;
    let answerTimeoutId = null;

    function getRandomInt(max) {
      return Math.floor(Math.random() * max);
    }

    function updateScore() {
      scoreDisplay.textContent = 'Score: ' + score;
    }

    function setupNewRound() {
      if (answerTimeoutId !== null) {
        clearTimeout(answerTimeoutId);
        answerTimeoutId = null;
      }
      messageDiv.textContent = '';
      choicesDiv.innerHTML = '';
      choicesDiv.style.display = 'none';
      answerBtn.style.display = 'none';

      correctColor = colorList[getRandomInt(colorList.length)];
      colorCircle.style.backgroundColor = correctColor.hex;
      colorNameDiv.textContent = 'Color Name';

      resetBtn.textContent = 'Start Game';
    }

    function startGameRound() {
      if (answerTimeoutId !== null) {
        clearTimeout(answerTimeoutId);
        answerTimeoutId = null;
      }
      messageDiv.textContent = '';
      colorNameDiv.textContent = 'What is this color?';
      choicesDiv.style.display = 'flex';
      answerBtn.style.display = 'inline-block';

      // Prepare options
      options = [correctColor];
      while (options.length < 4) {
        const randColor = colorList[getRandomInt(colorList.length)];
        if (!options.some(c => c.name === randColor.name)) {
          options.push(randColor);
        }
      }
      // Shuffle options
      for (let i = options.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [options[i], options[j]] = [options[j], options[i]];
      }

      // Create buttons for options
      choicesDiv.innerHTML = '';
      options.forEach(option => {
        const btn = document.createElement('button');
        btn.textContent = option.name;
        btn.onclick = () => {
          if (option.name === correctColor.name) {
            messageDiv.textContent = 'Correct! 🎉';
            score++;
            updateScore();
            choicesDiv.style.display = 'none';
            answerBtn.style.display = 'none';
            resetBtn.textContent = 'Play Again';
          } else {
            messageDiv.textContent = 'Try Again!';
          }
        };
        choicesDiv.appendChild(btn);
      });

      resetBtn.textContent = 'Play Again';
    }

    resetBtn.onclick = () => {
      if (resetBtn.textContent === 'Start Game') {
        startGameRound();
      } else {
        setupNewRound();
      }
    };

    answerBtn.onclick = () => {
      colorNameDiv.textContent = correctColor.name;
      if (answerTimeoutId !== null) {
        clearTimeout(answerTimeoutId);
      }
      answerTimeoutId = setTimeout(() => {
        colorNameDiv.textContent = 'What is this color?';
        answerTimeoutId = null;
      }, 2000);
    };

    // Initialize
    setupNewRound();
    updateScore();
  </script>
</body>
</html>
