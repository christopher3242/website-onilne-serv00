<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>European Roulette Game</title>
<style>
  /* --- General Styles --- */
  body {
    font-family: 'Arial', sans-serif;
    background-color: #1e1e1e;
    color: #fff;
    margin: 0;
    padding: 20px;
    text-align: center;
  }

  h1 {
    font-size: 2em;
    margin-bottom: 10px;
  }

  #balance {
    font-size: 1.2em;
    margin-bottom: 20px;
  }

  /* --- Bet Section --- */
  #bet-section {
    max-width: 400px;
    margin: 0 auto 20px auto;
    text-align: left;
    background: #2b2b2b;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
  }

  #bet-section label {
    display: inline-block;
    width: 120px;
  }

  #bet-section input[type="number"], 
  #bet-section select {
    width: 80px;
    padding: 5px;
    margin-bottom: 10px;
    border-radius: 5px;
    border: none;
    text-align: center;
  }

  #number-bet-container {
    margin-top: 10px;
  }

  /* --- Buttons --- */
  .buttons-container {
    margin-bottom: 20px;
  }

  .buttons-container button {
    margin: 5px;
    padding: 10px 20px;
    font-size: 1em;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: #ff6600;
    color: #fff;
    transition: transform 0.2s, background 0.2s;
  }

  .buttons-container button:hover {
    background: #ff8533;
    transform: scale(1.05);
  }

  /* --- Wheel Container --- */
  #wheel-container {
    margin: 30px auto;
    width: 350px;
    height: 350px;
    position: relative;
  }

  #wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 10px solid #444;
    box-sizing: border-box;
    transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);
  }

  #pointer {
    position: absolute;
    top: -15px;
    left: 50%;
    transform: translateX(-50%);
    width: 30px;
    height: 30px;
    background-color: yellow;
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    z-index: 10;
    animation: bounce 1s infinite alternate;
  }

  @keyframes bounce {
    0% { transform: translateX(-50%) translateY(0); }
    100% { transform: translateX(-50%) translateY(-5px); }
  }

  /* --- Result Text --- */
  #result {
    margin-top: 15px;
    font-size: 1.1em;
  }

  /* --- Mobile Responsive --- */
  @media(max-width: 500px) {
    #wheel-container {
      width: 90%;
      height: auto;
    }
    #bet-section label {
      width: 100%;
      margin-bottom: 5px;
    }
    #bet-section input, #bet-section select {
      width: 100%;
      margin-bottom: 10px;
    }
  }
</style>
</head>
<body>

<h1>European Roulette</h1>
<div id="balance">Balance: €<span id="balance-amount">1000</span></div>

<div id="bet-section">
  <label for="bet-amount">Bet Amount (€):</label>
  <input id="bet-amount" type="number" min="1" max="1000" value="10">
  <br>
  <label for="bet-type">Bet Type:</label>
  <select id="bet-type">
    <option value="number" selected>Number</option>
    <option value="red">Red</option>
    <option value="black">Black</option>
    <option value="even">Even</option>
    <option value="odd">Odd</option>
    <option value="green">Green</option>
  </select>

  <div id="number-bet-container">
    <label for="number-bet">Number (0-36):</label>
    <input id="number-bet" type="number" min="0" max="36">
  </div>
</div>

<div class="buttons-container">
  <button id="spin-btn">Spin</button>
  <button id="add-50-btn">Add €50</button>
  <a href="../Games.html"><button id="exit-btn">Exit</button></a>
</div>

<div id="wheel-container">
  <div id="pointer"></div>
  <div id="wheel"></div>
</div>

<div id="result"></div>

<script>
const balanceSpan = document.getElementById('balance-amount');
const betAmountInput = document.getElementById('bet-amount');
const betTypeSelect = document.getElementById('bet-type');
const numberBetContainer = document.getElementById('number-bet-container');
const numberBetInput = document.getElementById('number-bet');
const spinBtn = document.getElementById('spin-btn');
const add50Btn = document.getElementById('add-50-btn');
const resultDiv = document.getElementById('result');
const wheel = document.getElementById('wheel');

let balance = 1000;
let isSpinning = false;

// --- Show/hide number input ---
betTypeSelect.addEventListener('change', () => {
  numberBetContainer.style.display = (betTypeSelect.value === 'number') ? 'block' : 'none';
});

// --- Add €50 ---
add50Btn.addEventListener('click', () => {
  balance += 50;
  updateBalance();
});

// --- Exit button resets ---
document.getElementById('exit-btn').addEventListener('click', () => {
  balance = 1000;
  updateBalance();
  resultDiv.textContent = 'Game reset!';
});

// --- Roulette Segments ---
const segments = [];
const redNumbers = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
segments.push({number: 0, color: 'green', startDeg: 0, endDeg: 9.72});
let currentDeg = 9.72;
for (let n=1; n<=36; n++) {
  const color = redNumbers.includes(n) ? 'red' : 'black';
  segments.push({number: n, color: color, startDeg: currentDeg, endDeg: currentDeg + 9.72});
  currentDeg += 9.72;
}

// --- Wheel Gradient ---
function generateGradient() {
  return segments.map(seg => {
    const colorHex = seg.color === 'green' ? '#00FF00' : (seg.color === 'red' ? '#FF0000' : '#000000');
    return `${colorHex} ${seg.startDeg}deg ${seg.endDeg}deg`;
  }).join(', ');
}
function setWheelBackground() {
  wheel.style.background = `conic-gradient(${generateGradient()})`;
}
setWheelBackground();

// --- Spin Wheel ---
function spinWheel(betType, betNumber, betAmount) {
  isSpinning = true;
  resultDiv.textContent = '';

  const fullRotations = 4;
  const randIdx = Math.floor(Math.random() * segments.length);
  const targetSegment = segments[randIdx];
  const segmentMidDeg = (targetSegment.startDeg + targetSegment.endDeg) / 2;
  const stopDeg = fullRotations * 360 + (360 - segmentMidDeg);

  wheel.style.transition = 'transform 4s cubic-bezier(0.33, 1, 0.68, 1)';
  wheel.style.transform = `rotate(${stopDeg}deg)`;

  wheel.addEventListener('transitionend', () => {
    const number = targetSegment.number;
    const color = targetSegment.color;
    const isEven = number !== 0 && number % 2 === 0;

    let wins = false;
    if (betType === 'number') wins = (betNumber === number);
    else if (betType === 'red') wins = (color === 'red');
    else if (betType === 'black') wins = (color === 'black');
    else if (betType === 'even') wins = (number !== 0 && isEven);
    else if (betType === 'odd') wins = (number !== 0 && !isEven);
    else if (betType === 'green') wins = (color === 'green');

    let payout = 0;
    if (wins) {
      payout = (betType === 'number') ? betAmount * 35 : betAmount;
      balance += payout + betAmount;
      resultDiv.textContent = `Winning Number: ${number} (${color}). You win €${payout.toFixed(2)}!`;
    } else {
      resultDiv.textContent = `Winning Number: ${number} (${color}). You lose.`;
    }
    updateBalance();
    isSpinning = false;
  }, { once: true });
}

// --- Update Balance ---
function updateBalance() {
  balanceSpan.textContent = balance.toFixed(2);
}

// --- Spin Button ---
spinBtn.addEventListener('click', () => {
  if (isSpinning) return;

  const betAmount = parseFloat(betAmountInput.value);
  if (isNaN(betAmount) || betAmount <= 0 || betAmount > balance) {
    alert('Invalid bet amount');
    return;
  }

  const betType = betTypeSelect.value;
  let betNumber = null;
  if (betType === 'number') {
    betNumber = parseInt(numberBetInput.value);
    if (isNaN(betNumber) || betNumber < 0 || betNumber > 36) {
      alert('Enter a valid number between 0 and 36');
      return;
    }
  }

  balance -= betAmount;
  updateBalance();
  spinWheel(betType, betNumber, betAmount);
});
</script>

</body>
</html>
