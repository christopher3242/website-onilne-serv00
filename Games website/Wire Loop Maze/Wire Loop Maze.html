<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wire Loop Maze Game</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #222;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      h1 {
        color: #fff;
        margin-top: 20px;
      }
      #controls {
        margin-top: 10px;
      }
      button {
        margin: 5px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
      }
      #gameContainer {
        position: relative;
        width: 400px;
        height: 600px;
        border: 4px solid #fff;
        margin-top: 20px;
        background-color: #333;
        display: none; /* Hidden until game starts */
      }
      #player {
        width: 20px;
        height: 20px;
        background-color: lime;
        border-radius: 50%;
        position: absolute;
        top: 10px;
        left: 10px;
        touch-action: none;
      }
      #exit {
        position: absolute;
        bottom: 10px;
        right: 10px;
        width: 50px;
        height: 50px;
        background-color: green;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        cursor: pointer;
        color: #fff;
      }
      #goal {
        position: absolute;
        top: 10px;
        right: 70px;
        padding: 5px 10px;
        background: yellow;
        border-radius: 5px;
      }
      /* Maze walls styles */
      .wall {
        position: absolute;
        background-color: #555;
      }
      #wall1 {
        top: 90px;
        left: 50px;
        width: 200px;
        height: 10px;
      }
      #wall2 {
        top: 100px;
        left: 60px;
        width: 8px;
        height: 200px;
      }
      #wall3 {
        top: 300px;
        left: 50px;
        width: 100px;
        height: 10px;
      }
      #wall4 {
        top: 150px;
        left: 200px;
        width: 10px;
        height: 150px;
      }
      /* Styling for the exit container and link */
      .exit-container {
        position: absolute;
        bottom: 10px;
        right: 10px;
      }
      .exit-container a {
        display: block;
        width: 50px;
        height: 50px;
        background-color: red;
        color: #fff;
        text-align: center;
        line-height: 50px;
        border-radius: 10px;
        font-weight: bold;
        text-decoration: none;
        font-family: Arial, sans-serif;
      }
    </style>
  </head>
  <body>
    <h1>Wire Loop Maze Game</h1>
    <div id="controls">
      <button id="startBtn">Start Game</button>
      <button id="restartBtn" disabled>Restart</button>
    </div>

    <div id="gameContainer">
      <div id="player"></div>
      <div id="exit">EXIT</div>
      <!-- Maze Walls -->
      <div class="wall" id="wall1"></div>
      <div class="wall" id="wall2"></div>
      <div class="wall" id="wall3"></div>
      <div class="wall" id="wall4"></div>
      
      <!-- Exit container with link -->
      <div class="exit-container">
        <a href="../../your%20favorite.html" target="_blank">Go</a>
      </div>
    </div>

    <!-- Audio for sound effects -->
    <audio
      id="hitSound"
      src="https://www.soundjay.com/buttons/sounds/button-10.mp3"
      preload="auto"
    ></audio>
    <audio
      id="winSound"
      src="https://www.soundjay.com/misc/sounds/applause-8.mp3"
      preload="auto"
    ></audio>

    <script>
      const startBtn = document.getElementById("startBtn");
      const restartBtn = document.getElementById("restartBtn");
      const container = document.getElementById("gameContainer");
      const player = document.getElementById("player");
      const exitZone = document.getElementById("exit");

      const hitSound = document.getElementById("hitSound");
      const winSound = document.getElementById("winSound");

      let isDragging = false;
      let offsetX = 0;
      let offsetY = 0;
      let gameActive = false;

      // Start game
      startBtn.addEventListener("click", () => {
        container.style.display = "block";
        resetGame();
        gameActive = true;
        startBtn.disabled = true;
        restartBtn.disabled = false;
      });

      // Restart button
      restartBtn.addEventListener("click", () => {
        resetGame();
        gameActive = true;
      });

      // Drag start
      function startDrag(e) {
        if (!gameActive) return;
        e.preventDefault();
        isDragging = true;
        const rect = player.getBoundingClientRect();
        if (e.type === "touchstart") {
          offsetX = e.touches[0].clientX - rect.left;
          offsetY = e.touches[0].clientY - rect.top;
        } else {
          offsetX = e.clientX - rect.left;
          offsetY = e.clientY - rect.top;
        }
      }

      // Drag during
      function duringDrag(e) {
        if (!isDragging || !gameActive) return;
        e.preventDefault();

        let clientX, clientY;
        if (e.type === "touchmove") {
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        } else {
          clientX = e.clientX;
          clientY = e.clientY;
        }

        const containerRect = container.getBoundingClientRect();
        let newLeft = clientX - containerRect.left - offsetX;
        let newTop = clientY - containerRect.top - offsetY;

        // Keep within bounds
        newLeft = Math.max(
          0,
          Math.min(newLeft, container.clientWidth - player.offsetWidth)
        );
        newTop = Math.max(
          0,
          Math.min(newTop, container.clientHeight - player.offsetHeight)
        );

        player.style.left = newLeft + "px";
        player.style.top = newTop + "px";

        checkCollision();
        checkExit();
      }

      // End drag
      function endDrag() {
        isDragging = false;
      }

      // Reset game position
      function resetGame() {
        player.style.left = "10px";
        player.style.top = "10px";
      }

      // Collision detection
      function checkCollision() {
        const walls = document.querySelectorAll(".wall");
        const pRect = player.getBoundingClientRect();

        for (let wall of walls) {
          const wRect = wall.getBoundingClientRect();
          if (
            pRect.left < wRect.right &&
            pRect.right > wRect.left &&
            pRect.top < wRect.bottom &&
            pRect.bottom > wRect.top
          ) {
            hitSound.play();
            alert("Game Over! You hit a wall.");
            resetGame();
            break;
          }
        }
      }

      // Check if player reached exit
      function checkExit() {
        const pRect = player.getBoundingClientRect();
        const eRect = exitZone.getBoundingClientRect();

        if (
          pRect.right > eRect.left &&
          pRect.left < eRect.right &&
          pRect.bottom > eRect.top &&
          pRect.top < eRect.bottom
        ) {
          alert("Congratulations! You reached the exit.");
          winSound.play();
          gameActive = false;
        }
      }

      // Event listeners for dragging
      player.addEventListener("touchstart", startDrag, { passive: false });
      player.addEventListener("mousedown", startDrag);
      document.addEventListener("touchmove", duringDrag, { passive: false });
      document.addEventListener("mousemove", duringDrag);
      document.addEventListener("touchend", endDrag);
      document.addEventListener("mouseup", endDrag);
    </script>
  </body>
</html>
