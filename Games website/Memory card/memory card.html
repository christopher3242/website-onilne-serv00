<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory Card Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background-color: #f0f0f0;
    }

    h1 {
      margin-bottom: 10px;
    }

    #score-display {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .game-board {
      display: grid;
      grid-template-columns: repeat(5, 100px);
      grid-gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .card {
      width: 100px;
      height: 150px;
      background-color: #0c645d;
      cursor: pointer;
      position: relative;
      border-radius: 8px;
      box-shadow: 2px 2px 6px rgba(53, 208, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s;
    }

    .card img {
      width: 80%;
      height: auto;
      display: none;
      border-radius: 4px;
    }

    .card.flipped img {
      display: block;
    }

    .card.matched {
      opacity: 0.5;
      cursor: default;
    }

    .buttons-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: #007bff;
      color: white;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #0056b3;
    }

    #win-message {
      display: none;
      font-size: 24px;
      margin-top: 20px;
      color: green;
    }

    @media (max-width: 600px) {
      .game-board {
        grid-template-columns: repeat(4, 80px);
      }
      .card {
        width: 80px;
        height: 120px;
      }
    }
  </style>
</head>
<body>
  <h1>Memory Card Game</h1>
  <div id="score-display">Score: 0</div>
  <div id="game-board" class="game-board"></div>
  <div class="buttons-container">
    <button id="show-answer">Show Answer</button>
    <button id="reset-button">Restart Game</button>
    <a href="../games.html"><button id="exit-button">Exit Game</button></a>
  </div>
  <div id="win-message">Congratulations! You won!</div>

  <script>
    const gameBoard = document.getElementById('game-board');
    const resetButton = document.getElementById('reset-button');
    const showAnswerButton = document.getElementById('show-answer');
    const scoreDisplay = document.getElementById('score-display');
    const winMessage = document.getElementById('win-message');

 
    // Placeholder images (replace with your actual image URLs)
    const cardValues = [
      'image1.png',
  'image2.png',
  'image3.png',
  'image4.png',
  'image5.png',
  'image6.png',
  'image7.png',
  'image8.png',
  'image9.png',
  'image10.png',
    ];

    let cardsArray = [...cardValues, ...cardValues]; // create pairs
    let totalPairs = cardValues.length;
    let matchedPairsCount = 0;

    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let score = 0;

    // Shuffle array
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    // Create card element
    function createCardElement(value) {
      const card = document.createElement('div');
      card.classList.add('card');
      card.dataset.value = value;

      const img = document.createElement('img');
      img.src = value;
      img.alt = 'Memory Card Image';

      card.appendChild(img);
      card.addEventListener('click', flipCard);
      gameBoard.appendChild(card);
    }

    // Flip card handler
    function flipCard() {
      if (lockBoard || this === firstCard || this.classList.contains('matched')) return;

      this.classList.add('flipped');

      if (!firstCard) {
        firstCard = this;
      } else {
        secondCard = this;
        lockBoard = true;

        checkForMatch();
      }
    }

    // Check for match
    function checkForMatch() {
      if (firstCard.dataset.value === secondCard.dataset.value) {
        // Match found
        firstCard.classList.add('matched');
        secondCard.classList.add('matched');

        updateScore(1);
        matchedPairsCount++;
        resetBoard();

        if (matchedPairsCount === totalPairs) {
          displayWinMessage();
        }
      } else {
        // Wait 2 seconds before flipping back
        setTimeout(() => {
          firstCard.classList.remove('flipped');
          secondCard.classList.remove('flipped');
          resetBoard();
        }, 2000);
      }
    }

    // Update score
    function updateScore(points) {
      score += points;
      scoreDisplay.textContent = `Score: ${score}`;
    }

    // Reset selection
    function resetBoard() {
      [firstCard, secondCard] = [null, null];
      lockBoard = false;
    }

    // Setup game
    function setupGame() {
      score = 0;
      scoreDisplay.textContent = `Score: ${score}`;
      matchedPairsCount = 0;
      winMessage.style.display = 'none';

      // Shuffle and create cards
      shuffle(cardsArray);
      gameBoard.innerHTML = '';
      cardsArray.forEach(createCardElement);
    }

    // Show answer: reveal all cards temporarily
    function showAnswer() {
      document.querySelectorAll('.card').forEach(card => {
        if (!card.classList.contains('matched')) {
          card.classList.add('flipped');
        }
      });
      // Hide after 2 seconds
      setTimeout(() => {
        document.querySelectorAll('.card').forEach(card => {
          if (!card.classList.contains('matched')) {
            card.classList.remove('flipped');
          }
        });
      }, 2000);
    }

    // Display win message
    function displayWinMessage() {
      winMessage.style.display = 'block';
    }

    // Event listeners
    resetButton.addEventListener('click', setupGame);
    showAnswerButton.addEventListener('click', showAnswer);

    // Initialize game
    setupGame();
  </script>
</body>
</html>
