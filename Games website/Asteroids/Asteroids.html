<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Asteroids Game</title>
<style>
  body {
    text-align: center;
    background-color: black;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }
  h1 {
    margin: 10px 0;
  }
  #score, #lives, #topScore {
    font-size: 24px;
    margin: 10px;
  }
  .exit-link {
    display: inline-block;
    margin: 10px;
    padding: 8px 16px;
    background-color: #444;
    color: white;
    text-decoration: none;
    border-radius: 4px;
  }
  .exit-link:hover {
    background-color: #666;
  }
  canvas {
    display: block;
    margin: 0 auto;
    background: black;
    width: 100%;
    max-width: 800px;
    height: auto;
  }
  /* Touch controls styling */
  #touchControls {
    position: fixed;
    bottom: 10px;
    left: 10px;
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  .touch-btn {
    width: 60px;
    height: 60px;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    border: 2px solid #fff;
    font-size: 24px;
    line-height: 60px;
    text-align: center;
    user-select: none;
  }
</style>
</head>
<body>
<h1>Asteroids Game</h1>
<div id="topScore">Top Score: 0</div>
<div id="score">Score: 0</div>
<div id="lives">Lives: 3</div>
<a href="../games.html" class="exit-link">Exit</a>
<canvas id="gameCanvas" width="800" height="600"></canvas>

<!-- Touch controls -->
<div id="touchControls">
  <div class="touch-btn" id="leftBtn">&#8592;</div>
  <div class="touch-btn" id="upBtn">&#8593;</div>
  <div class="touch-btn" id="rightBtn">&#8594;</div>
  <div class="touch-btn" id="shootBtn">&#9679;</div>
</div>

<script>
// Load or initialize top score
let topScore = localStorage.getItem('topScore') || 0;

const shootSound = new Audio('https://freesound.org/data/previews/256/256113_4486188-lq.mp3');
const explosionSound = new Audio('https://freesound.org/data/previews/256/256114_4486188-lq.mp3');

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const scoreDiv = document.getElementById('score');
const livesDiv = document.getElementById('lives');
const topScoreDiv = document.getElementById('topScore');

let score = 0;
let lives = 3;

function updateTopScore() {
  document.getElementById('topScore').textContent = 'Top Score: ' + topScore;
}

function updateScore() {
  scoreDiv.textContent = 'Score: ' + score;
  if (score > topScore) {
    topScore = score;
    localStorage.setItem('topScore', topScore);
    updateTopScore();
  }
}

function updateLives() {
  livesDiv.textContent = 'Lives: ' + lives;
}

const keys = {};
// Keyboard controls
document.addEventListener('keydown', e => keys[e.key] = true);
document.addEventListener('keyup', e => keys[e.key] = false);

// Touch controls
const leftBtn = document.getElementById('leftBtn');
const rightBtn = document.getElementById('rightBtn');
const upBtn = document.getElementById('upBtn');
const shootBtn = document.getElementById('shootBtn');

leftBtn.addEventListener('touchstart', () => keys['ArrowLeft'] = true);
leftBtn.addEventListener('touchend', () => keys['ArrowLeft'] = false);
rightBtn.addEventListener('touchstart', () => keys['ArrowRight'] = true);
rightBtn.addEventListener('touchend', () => keys['ArrowRight'] = false);
upBtn.addEventListener('touchstart', () => keys['ArrowUp'] = true);
upBtn.addEventListener('touchend', () => keys['ArrowUp'] = false);
shootBtn.addEventListener('touchstart', () => keys[' '] = true);
shootBtn.addEventListener('touchend', () => keys[' '] = false);

// Prevent scrolling on touch
document.body.addEventListener('touchstart', e => e.preventDefault());
document.body.addEventListener('touchmove', e => e.preventDefault());

class Ship {
  constructor() {
    this.x = canvas.width / 2;
    this.y = canvas.height / 2;
    this.angle = 0;
    this.speed = 0;
    this.radius = 15;
    this.canShoot = true;
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.beginPath();
    ctx.moveTo(0, -15);
    ctx.lineTo(10, 10);
    ctx.lineTo(-10, 10);
    ctx.closePath();
    ctx.strokeStyle = 'white';
    ctx.stroke();
    ctx.restore();
  }

  update() {
    if (keys['ArrowLeft']) this.angle -= 0.05;
    if (keys['ArrowRight']) this.angle += 0.05;
    if (keys['ArrowUp']) {
      this.speed += 0.1;
    } else {
      this.speed *= 0.99;
    }

    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;

    if (this.x > canvas.width) this.x = 0;
    if (this.x < 0) this.x = canvas.width;
    if (this.y > canvas.height) this.y = 0;
    if (this.y < 0) this.y = canvas.height;
  }
}

class Asteroid {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.radius = 20 + Math.random() * 30;
    this.speedX = (Math.random() - 0.5) * 2;
    this.speedY = (Math.random() - 0.5) * 2;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.strokeStyle = 'white';
    ctx.stroke();
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x > canvas.width + this.radius) this.x = -this.radius;
    if (this.x < -this.radius) this.x = canvas.width + this.radius;
    if (this.y > canvas.height + this.radius) this.y = -this.radius;
    if (this.y < -this.radius) this.y = canvas.height + this.radius;
  }
}

class Bullet {
  constructor(x, y, angle) {
    this.x = x;
    this.y = y;
    this.speed = 7;
    this.angle = angle;
    this.radius = 2;
    this.life = 60;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = 'white';
    ctx.fill();
  }

  update() {
    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;
    this.life--;
    if (
      this.x > canvas.width || this.x < 0 ||
      this.y > canvas.height || this.y < 0 ||
      this.life <= 0
    ) {
      return false;
    }
    return true;
  }
}

const ship = new Ship();
const asteroids = [];
const bullets = [];

for (let i = 0; i < 8; i++) {
  asteroids.push(new Asteroid());
}

updateScore();
updateLives();
updateTopScore();

function checkCollision(obj1, obj2) {
  const dx = obj1.x - obj2.x;
  const dy = obj1.y - obj2.y;
  const distance = Math.sqrt(dx * dx + dy * dy);
  return distance < obj1.radius + obj2.radius;
}

function gameOver() {
  alert('Game Over! Your score: ' + score);
  localStorage.setItem('topScore', topScore);
  document.location.reload();
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ship.update();
  ship.draw();

  if (keys[' '] && ship.canShoot) {
    bullets.push(new Bullet(ship.x + Math.cos(ship.angle) * 15, ship.y + Math.sin(ship.angle) * 15, ship.angle));
    shootSound.play();
    ship.canShoot = false;
  }
  if (!keys[' ']) {
    ship.canShoot = true;
  }

  for (let i = bullets.length - 1; i >= 0; i--) {
    if (!bullets[i].update()) {
      bullets.splice(i, 1);
    } else {
      bullets[i].draw();
    }
  }

  for (let i = asteroids.length - 1; i >= 0; i--) {
    asteroids[i].update();
    asteroids[i].draw();

    if (checkCollision(ship, asteroids[i])) {
      explosionSound.play();
      lives--;
      updateLives();
      if (lives <= 0) {
        gameOver();
        return;
      } else {
        ship.x = canvas.width / 2;
        ship.y = canvas.height / 2;
        ship.speed = 0;
      }
    }

    for (let j = bullets.length - 1; j >= 0; j--) {
      if (checkCollision(asteroids[i], bullets[j])) {
        explosionSound.play();
        asteroids.splice(i, 1);
        bullets.splice(j, 1);
        score += 10;
        updateScore();
        if (asteroids.length < 12) {
          for (let k = 0; k < 2; k++) {
            asteroids.push(new Asteroid());
          }
        }
        break;
      }
    }
  }

  requestAnimationFrame(gameLoop);
}

updateScore();
updateLives();
gameLoop();
</script>
</body>
</html>
