<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake Games</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    background-color: #4682B4; /* Blue background */
    margin: 0;
    font-family: 'Arial', sans-serif;
  }

  h1 {
    margin: 20px 0;
    font-size: 48px;
    color: #FFFFFF;
    text-shadow: 2px 2px 4px #000;
  }

  /* Style for the game canvas */
  #gameCanvas {
    background-color: #000;
    border: 2px solid #555;
    width: 90%;
    max-width: 400px;
    height: auto;
  }

  /* Info and controls */
  #score, #bestScore {
    font-size: 20px;
    margin: 8px 0;
    color: #FFFFFF;
  }

  #exit {
    margin-top: 10px;
    text-decoration: none;
    color: #FFD700;
    font-size: 18px;
  }

  #exit:hover {
    text-decoration: underline;
  }

  #controller {
    width: 100%;
    max-width: 400px;
    height: 60px;
    background-color: rgba(255, 255, 255, 0.2);
    display: flex;
    justify-content: space-around;
    align-items: center;
    margin-top: 10px;
  }

  .control {
    flex: 1;
    text-align: center;
    font-size: 24px;
    cursor: pointer;
    user-select: none;
  }

  .control:hover {
    background-color: rgba(255, 255, 255, 0.4);
  }
</style>
</head>
<body>

<h1>Snake Games</h1>

<canvas id="gameCanvas" width="400" height="400"></canvas>

<div id="score">Score: 0</div>
<div id="bestScore">Best Score: 0</div>

<a id="exit" href="../games.html" moz-do-not-send="true">Exit</a>

<div id="controller">
  <div class="control" id="left">←</div>
  <div class="control" id="up">↑</div>
  <div class="control" id="down">↓</div>
  <div class="control" id="right">→</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const box = 20;
let snake = [{ x: box * 5, y: box * 5 }];
let food = {
    x: Math.floor(Math.random() * (canvas.width / box)) * box,
    y: Math.floor(Math.random() * (canvas.height / box)) * box
};
let direction = 'RIGHT';
let nextDirection = direction;
let score = 0;
let bestScore = localStorage.getItem('bestScore') ? parseInt(localStorage.getItem('bestScore')) : 0;

document.getElementById('bestScore').innerText = 'Best Score: ' + bestScore;

document.addEventListener('keydown', (event) => changeDirection(event));
document.getElementById('left').addEventListener('click', () => changeDirection({ keyCode: 37 }));
document.getElementById('up').addEventListener('click', () => changeDirection({ keyCode: 38 }));
document.getElementById('down').addEventListener('click', () => changeDirection({ keyCode: 40 }));
document.getElementById('right').addEventListener('click', () => changeDirection({ keyCode: 39 }));

function changeDirection(event) {
    if (event instanceof KeyboardEvent) {
        event.preventDefault();
    }
    const keyCode = event.keyCode;
    if (keyCode === 37 && nextDirection !== 'RIGHT') nextDirection = 'LEFT';
    else if (keyCode === 38 && nextDirection !== 'DOWN') nextDirection = 'UP';
    else if (keyCode === 39 && nextDirection !== 'LEFT') nextDirection = 'RIGHT';
    else if (keyCode === 40 && nextDirection !== 'UP') nextDirection = 'DOWN';
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw food
    ctx.fillStyle = 'red';
    ctx.fillRect(food.x, food.y, box, box);

    // Update position
    let snakeX = snake[0].x;
    let snakeY = snake[0].y;
    direction = nextDirection;

    if (direction === 'LEFT') snakeX -= box;
    if (direction === 'UP') snakeY -= box;
    if (direction === 'RIGHT') snakeX += box;
    if (direction === 'DOWN') snakeY += box;

    // Check for eating food
    if (snakeX === food.x && snakeY === food.y) {
        score++;
        document.getElementById('score').innerText = 'Score: ' + score;
        food = {
            x: Math.floor(Math.random() * (canvas.width / box)) * box,
            y: Math.floor(Math.random() * (canvas.height / box)) * box
        };
    } else {
        snake.pop(); // Remove tail
    }

    // Check for collisions
    const newHead = { x: snakeX, y: snakeY };
    if (
        snakeX < 0 || snakeY < 0 ||
        snakeX >= canvas.width || snakeY >= canvas.height ||
        collision(newHead, snake)
    ) {
        clearInterval(game);
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('bestScore', bestScore);
            document.getElementById('bestScore').innerText = 'Best Score: ' + bestScore;
        }
        alert('Game Over! Final Score: ' + score);
        document.location.reload();
        return;
    }

    snake.unshift(newHead);

    // Draw snake
    for (let i = 0; i < snake.length; i++) {
        ctx.fillStyle = (i === 0) ? 'lime' : 'green';
        ctx.fillRect(snake[i].x, snake[i].y, box, box);
    }
}

function collision(head, array) {
    for (let i = 0; i < array.length; i++) {
        if (head.x === array[i].x && head.y === array[i].y) {
            return true;
        }
    }
    return false;
}

const game = setInterval(draw, 180);
</script>
</body>
</html>
