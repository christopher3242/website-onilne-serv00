<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,
      initial-scale=1.0">
    <title>My Info</title>
    <style>
  body {
    background-color: rgb(40, 65, 97);
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
  }

  /* Exit button styling */
  .exit-link {
    position: fixed;
    top: 20px;
    right: 20px;
    background-color: #ff4d4d;
    color: #fff;
    padding: 10px 15px;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
    transition: background-color 0.3s;
  }

  .exit-link:hover {
    background-color: #cc0000;
  }

  /* Header styling without underline and with margin-top for bell icon */
  .header {
    text-align: center;
    font-size: 2em;
    color: #9e9eff;
    font-weight: bold;
    margin-top: 30px; /* space from top */
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Bell icon styling */
  .bell-icon {
    font-size: 24px;
    margin-right: 10px;
  }

  /* Info box styling */
  .info-box {
    max-width: 400px;
    margin: 20px auto;
    background-color: rgba(106, 130, 165, 0.171);
    padding: 20px;
    border-radius: 10px;
  }

  .name {
    font-size: 1.5em;
    color: #c0c0c0;
    text-align: center;
    margin-bottom: 10px;
  }

  .details {
    font-size: 1em;
    line-height: 1.5;
    color: #336666;
  }

  /* Images styling */
  .images-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
    flex-wrap: wrap;
  }

  .images-container img {
    max-width: 150px;
    height: auto;
    border-radius: 10px;
    border: 2px solid #ccc;
  }

  @media(max-width: 600px){
    body {
      padding: 10px;
    }
    .images-container {
      flex-direction: column;
      align-items: center;
    }
    .images-container img {
      max-width: 80%;
    }
  }
</style>
  </head>
  <body>
    <!-- Exit Button --> <a href="../../your%20favorite.html"
      class="exit-link">Exit</a>
    <!-- Header with bell icon -->
    <div class="header">
      <div class="bell-icon"><font size="+3" face="Bell MT"><u><br>
          </u></font></div>
      <font size="+3" face="Bell MT"><u> </u><u> </u></font><!-- Bell icon emoji -->
      <div><font size="+3" face="Bell MT"><u>My Info</u></font></div>
    </div>
    <!-- Info Content -->
    <div class="info-box">
      <div class="name"><font color="#33ccff">Name: Christopher Nicholai
          Camilleri</font></div>
      <div class="details">
        <p align="center"><font color="#ffffcc">Age: 22 (06/12/2003)</font></p>
        <font color="#ffffcc"> </font>
        <p align="center"><font color="#ffffcc">Live in: Malta &amp;
            Marsaskala</font></p>
      </div>
    </div>
    <!-- Images -->
    <div class="images-container"> <img src="Chris1.gif"
        alt="Christopher"> <img src="Chris2.gif" alt="Christopher"> <img
        src="pomeranian angry.gif" alt="Christopher"> </div>
  </body>
</html>
