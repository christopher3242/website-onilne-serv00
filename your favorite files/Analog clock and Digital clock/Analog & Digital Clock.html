<!DOCTYPE html>
<html lang="en">
  <head>

    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,
      initial-scale=1.0">
    <title>Analog & Digital Clock</title>
    <style>
/* Your existing CSS styles adapted for layout and theme */

* {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    font-family: sans-serif;
}

body {
    height: 100vh;
    background: #585252;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Styling the main container */
main {
    width: 550px;
    background: #0a0f1c; /* Dark theme */
    color: #9ca3af;
    padding: 25px;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    gap: 25px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
}

/* Header section styles */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Brand styles */
.brand {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo {
    font-size: 22px;
    padding: 15px;
    background: #15b7b9; /* Blue theme color */
    color: #fff;
    border-radius: 10px;
}

.title {
    font-size: 18px;
    font-weight: 500;
}
.subtitle {
    font-size: 12px;
}

/* Toggle buttons styles */
.toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255, 255, 255, 0.05);
    padding: 6px;
    border-radius: 150px;
}

.btn {
    padding: 8px 12px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    background-color: #15b7b9; /* Blue theme */
    color: #fff;
    user-select: none;
}

.activeToggle {
    background-color: #00ff00; /* Green for active toggle (optional) */
    color: #fff;
}

/* Display section styles */
.display {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Digital clock styles */
.time-wrap {
    display: flex;
    align-items: baseline;
}

.time {
    font-size: 65px;
    color: #fff;
    font-weight: 600;
    letter-spacing: 6px;
}

.ampm {
    font-size: 18px;
    margin-left: 10px;
    color: #9ca3af;
}

/* Date and day info styles */
.meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    text-align: right;
}

#date, #day {
    font-size: 14px;
    margin: 4px 0;
}

/* Footer styles */
.foot {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-top: 10px;
}

/* Exit link styles */
.exit-container {
    margin-top: 15px;
    text-align: right;
}

.exit-link {
    text-decoration: none;
    color: #15b7b9; /* Blue theme color */
    font-weight: 600;
}
</style>
  </head>
  <body>
    <div style="position: absolute; left: 443px; top: 60px; width:
      462px; height: 57px;">
      <h1 style="text-align:center; margin-bottom:20px;">Analog & Digital Clock</h1>
    </div>
    <p><br>
    </p>
    <main>
      <div class="header">
        <div class="brand">
          <div class="logo">CL</div>
          <div>
            <div class="title">Digital Clock</div>
            <div class="subtitle">12/24 hour - Dark mode only</div>
          </div>
        </div>
        <div class="toggle">
          <div id="btn-12" class="btn activeToggle">12 hr</div>
          <div id="btn-24" class="btn">24 hr</div>
        </div>
      </div>
      <div class="display">
        <div class="time-wrap">
          <div class="time" id="time">00:00:00</div>
          <div class="ampm" id="ampm">AM</div>
        </div>
        <div class="meta">
          <div id="date">January 1, 2025</div>
          <div id="day">Monday</div>
        </div>
      </div>
      <div class="foot">
        <div>Auto updates every second</div>
        <div>Local Time</div>
      </div>
      <div class="exit-container"> <a href="../../your%20favorite.html"
          class="exit-link">exit</a> </div>
    </main>
    <script>
// Select elements
const btn_12 = document.getElementById("btn-12");
const btn_24 = document.getElementById("btn-24");
const time = document.getElementById("time");
const ampm = document.getElementById("ampm");
const date = document.getElementById("date");
const day = document.getElementById("day");

// State variable for 12/24 hour mode
let hour12 = true;

function pad(n) {
    return String(n).padStart(2, "0");
}

function clock() {
    const now = new Date();

    let h = now.getHours();
    let m = now.getMinutes();
    let s = now.getSeconds();

    let AmPm = "";

    if (hour12) {
        AmPm = h >= 12 ? "PM" : "AM";
        h = h % 12 || 12;
    }

    time.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
    ampm.textContent = AmPm;
    ampm.style.display = hour12 ? "block" : "none";

    // Format date string
    const optionsDate = { day: "numeric", month: "long", year: "numeric" };
    const optionsDay = { weekday: "long" };

    date.textContent = now.toLocaleDateString("en-US", optionsDate);
    day.textContent = now.toLocaleDateString("en-US", optionsDay);
}

// Event listeners for toggle buttons
btn_12.addEventListener("click", () => {
    hour12 = true;
    btn_12.classList.add("activeToggle");
    btn_24.classList.remove("activeToggle");
});

btn_24.addEventListener("click", () => {
    hour12 = false;
    btn_12.classList.remove("activeToggle");
    btn_24.classList.add("activeToggle");
});

// Initial clock update and set interval
clock();
setInterval(clock, 1000);
</script>
  </body>
</html>
