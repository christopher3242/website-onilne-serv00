<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Centered Notes App</title>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    margin: 0;
    background-color: #a8a8a8;
  }
  .container {
    background-color: #fff;
    padding: 20px;
    margin-top: 50px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    width: 90%;
    max-width: 600px;
  }
  h2 {
    text-align: center;
    margin-top: 0;
  }
  #notes {
    width: 100%;
    height: 200px;
    padding: 10px;
    border: 1px solid #ccc;
    resize: none;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
    font-size: 14px;
  }
  .controls {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: space-between;
  }
  select, button {
    padding: 8px 12px;
    font-size: 14px;
    cursor: pointer;
  }
  /* Drag & Drop area styles */
  #dropZone {
    margin-top: 15px;
    padding: 20px;
    border: 2px dashed #999;
    border-radius: 8px;
    text-align: center;
    color: #555;
    font-size: 14px;
    cursor: pointer;
    background-color: #f9f9f9;
  }
  #dropZone.hover {
    border-color: #333;
    background-color: #eef;
  }
</style>
</head>
<body>
<div class="container">
  <h2>Notes</h2>
  <!-- Textarea for notes -->
  <textarea id="notes" placeholder="Write your notes here..."></textarea>
  <!-- Background color list -->
  <div style="margin-top:10px;">
    <label for="bgColor">Background Color:</label>
    <select id="bgColor">
      <option value="" selected="selected">Select color</option>
      <option value="#ffffff">White</option>
      <option value="#f8d7da">Light Red</option>
      <option value="#d4edda">Light Green</option>
      <option value="#d1ecf1">Light Blue</option>
      <option value="#fff3cd">Light Yellow</option>
      <option value="#ffe4e1">Misty Rose</option>
      <option value="#e0ffff">Light Cyan</option>
      <option value="#f0e68c">Khaki</option>
      <option value="#dda0dd">Plum</option>
      <option value="#ffe4b5">Moccasin</option>
      <option value="#d2b48c">Tan</option>
      <option value="#add8e6">Light Blue</option>
      <option value="#90ee90">Light Green</option>
      <option value="#ffb6c1">Light Pink</option>
      <option value="#fa8072">Salmon</option>
      <option value="#f5f5dc">Beige</option>
      <option value="#e6e6fa">Lavender</option>
      <option value="#bcf5bc">Mint Green</option>
      <option value="#ffd700">Gold</option>
      <option value="#2f4f4f">Coal</option>
      <option value="#000000">Black</option>
      <option value="#708090">Slate Gray</option>
      <option value="#556b2f">Dark Olive Green</option>
      <option value="#4b0082">Indigo</option>
      <option value="#8b0000">Dark Red</option>
      <option value="#006400">Dark Green</option>
      <option value="#8b4513">Saddle Brown</option>
      <option value="#483d8b">Dark Slate Blue</option>
      <option value="#696969">Dim Gray</option>
      <option value="#4b0082">Dark Indigo</option>
      <option value="#1c1c1c">Very Dark Gray</option>
      <option value="#2c2c2c">Dark Charcoal</option>
      <option value="#3a3a3a">Dark Gray</option>
    </select>
  </div>
  <!-- Buttons: Clear, Save, Exit -->
  <div class="controls">
    <button onclick="clearNotes()">Clear</button>
    <button onclick="saveNotes()">Save</button>
    <a href="../../your%20favorite.html"><button onclick="exitEditor()">Exit</button></a>
  </div>
  <!-- Drag & Drop area -->
  <div id="dropZone">Drag & Drop a .txt file here to load notes</div>
  <!-- File load input -->
  <div style="margin-top:10px;">
    <input type="file" id="loadFile" accept=".txt" />
    <button onclick="loadNotes()">Load File</button>
  </div>
</div>
<script>
  const bgColors = [
    "#ffffff", "#f8d7da", "#d4edda", "#d1ecf1", "#fff3cd",
    "#ffe4e1", "#e0ffff", "#f0e68c", "#dda0dd", "#ffe4b5",
    "#d2b48c", "#add8e6", "#90ee90", "#ffb6c1", "#fa8072",
    "#f5f5dc", "#e6e6fa", "#bcf5bc", "#ffd700", "#2f4f4f"
  ];

  // Load saved notes if any
  window.onload = function() {
    const savedNotes = localStorage.getItem('notes');
    if (savedNotes) {
      document.getElementById('notes').value = savedNotes;
    }
    const savedColor = localStorage.getItem('bgColor');
    if (savedColor) {
      document.getElementById('notes').style.backgroundColor = savedColor;
      document.getElementById('bgColor').value = savedColor;
    } else {
      const randomColor = bgColors[Math.floor(Math.random() * bgColors.length)];
      document.getElementById('notes').style.backgroundColor = randomColor;
      document.getElementById('bgColor').value = randomColor;
    }
  }

  // Change background color
  document.getElementById('bgColor').addEventListener('change', function() {
    document.getElementById('notes').style.backgroundColor = this.value;
    localStorage.setItem('bgColor', this.value);
  });

  // Clear notes
  function clearNotes() {
    document.getElementById('notes').value = '';
  }

  // Save notes
  function saveNotes() {
    localStorage.setItem('notes', document.getElementById('notes').value);
    alert('Notes saved!');
  }

  // Load notes from file
  function loadNotes() {
    const fileInput = document.getElementById('loadFile');
    const file = fileInput.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('notes').value = e.target.result;
        localStorage.setItem('notes', e.target.result);
      };
      reader.readAsText(file);
    } else {
      alert('Please select a file to load.');
    }
  }

  // Drag & Drop functionality
  const dropZone = document.getElementById('dropZone');

  dropZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.add('hover');
  });

  dropZone.addEventListener('dragleave', function(e) {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.remove('hover');
  });

  dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.remove('hover');

    const files = e.dataTransfer.files;
    if (files.length > 0) {
      const file = files[0];
      if (file.name.endsWith('.txt')) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('notes').value = e.target.result;
          localStorage.setItem('notes', e.target.result);
        };
        reader.readAsText(file);
      } else {
        alert('Please drop a .txt file.');
      }
    }
  });

  // Optional: clicking the drop zone opens file dialog
  dropZone.addEventListener('click', function() {
    document.getElementById('loadFile').click();
  });
</script>
</body>
</html>
