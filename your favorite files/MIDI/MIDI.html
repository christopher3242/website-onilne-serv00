<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>MIDI Mix Studio Pro</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  text-align: center;
  touch-action: manipulation;
  user-select: none;
}

h1 { margin: 10px; }

.ui {
  background: white;
  padding: 10px;
  margin: 10px auto;
  width: 92%;
  border-radius: 10px;
  box-shadow: 0 2px 8px #ccc;
}

button {
  margin: 4px;
  padding: 10px;
  cursor: pointer;
}

a.btn.btn-primary.btn-lg {
  display: inline-block;
  padding: 10px 20px;
  font-size: 18px;
  font-weight: bold;
  color: white;
  background-color: #007bff;
  border-radius: 5px;
  text-decoration: none;
}

input[type=range] {
  width: 140px;
}

.layout {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.keyboard {
  position: relative;
  display: flex;
}

.white {
  width: 50px;
  height: 200px;
  background: white;
  border: 1px solid #333;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  cursor: pointer;
}

.black {
  width: 35px;
  height: 120px;
  background: black;
  color: white;
  position: absolute;
  z-index: 2;
  cursor: pointer;
}

.b1 { left: 35px; }
.b2 { left: 85px; }
.b3 { left: 185px; }
.b4 { left: 235px; }
.b5 { left: 285px; }

.panel {
  width: 260px;
  background: white;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.drums {
  margin-top: 15px;
}

.pad {
  width: 70px;
  height: 70px;
  background: orange;
  display: inline-block;
  margin: 5px;
  line-height: 70px;
  font-weight: bold;
  cursor: pointer;
}

.eq {
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>MIDI Mix Studio Pro 🎛</h1>

<div class="ui">

<!-- Instruments -->
<button onclick="setInstrument('piano')">🎹 Piano</button>
<button onclick="setInstrument('trumpet')">🎺 Trumpet</button>
<button onclick="setInstrument('guitar')">🎸 Guitar</button>
<button onclick="setInstrument('brass')">🎷 Brass</button>
<button onclick="setInstrument('reed')">🎶 Reed</button>
<button onclick="setInstrument('pipe')">🪈 Pipe</button>
<button onclick="setInstrument('beat')">🥁 Beat</button>

<br>

Volume:
<input type="range" min="0" max="1" step="0.01" value="1"
oninput="volume=this.value" />

<!-- EQ MIXER -->
<div class="eq">
<h4>EQ Mixer</h4>
Low <input type="range" min="0" max="2" step="0.01" value="1" oninput="eq.low=this.value">
Mid <input type="range" min="0" max="2" step="0.01" value="1" oninput="eq.mid=this.value">
High <input type="range" min="0" max="2" step="0.01" value="1" oninput="eq.high=this.value">
</div>

<br>

<!-- Controls -->
<button onclick="startRecording()">Record</button>
<button onclick="stopRecording()">Stop</button>
<button onclick="playRecording()">Playback</button>
<button onclick="downloadMIDI()">Export MIDI</button>

<!-- Import MIDI -->
<input type="file" id="midiFile" accept=".mid,.midi" hidden>
<button onclick="document.getElementById('midiFile').click()">Import MIDI</button>

<a href="../../your%20favorite.html" class="btn btn-primary btn-lg">Exit</a>

</div>

<div class="layout">

<!-- Keyboard -->
<div class="keyboard">

  <div class="white" onclick="playNote(261.63,'C',60)">C</div>
  <div class="white" onclick="playNote(293.66,'D',62)">D</div>
  <div class="white" onclick="playNote(329.63,'E',64)">E</div>
  <div class="white" onclick="playNote(349.23,'F',65)">F</div>
  <div class="white" onclick="playNote(392.00,'G',67)">G</div>
  <div class="white" onclick="playNote(440.00,'A',69)">A</div>
  <div class="white" onclick="playNote(493.88,'B',71)">B</div>

  <div class="black b1" onclick="playNote(277.18,'C#',61)">C#</div>
  <div class="black b2" onclick="playNote(311.13,'D#',63)">D#</div>
  <div class="black b3" onclick="playNote(369.99,'F#',66)">F#</div>
  <div class="black b4" onclick="playNote(415.30,'G#',68)">G#</div>
  <div class="black b5" onclick="playNote(466.16,'A#',70)">A#</div>

</div>

</div>

<!-- DRUMS -->
<div class="drums">
  <h3>Drums</h3>
  <div class="pad" onclick="drum(120,'Kick')">Kick</div>
  <div class="pad" onclick="drum(220,'Snare')">Snare</div>
  <div class="pad" onclick="drum(320,'Hat')">Hat</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/midi-parser-js"></script>

<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();

/* controls */
let instrument = "piano";
let volume = 1;

/* EQ */
let eq = {low:1, mid:1, high:1};

/* recording */
let recording = false;
let startTime = 0;
let midiEvents = [];

/* unlock audio */
document.addEventListener("touchstart", ()=> {
  if(ctx.state==="suspended") ctx.resume();
},{once:true});

/* instrument model */
function setInstrument(i){ instrument = i; }

/* EQ filter */
function applyEQ(gainNode){
  const freq = ctx.createBiquadFilter();
  freq.type = "peaking";
  freq.frequency.value = 1000;
  freq.gain.value = (eq.mid - 1) * 10;

  gainNode.connect(freq);
  freq.connect(ctx.destination);
}

/* synth engine */
function playNote(freq, name, midi){

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.frequency.value = freq;

  if(instrument==="piano") osc.type="sine";
  if(instrument==="trumpet") osc.type="sawtooth";
  if(instrument==="guitar") osc.type="triangle";
  if(instrument==="brass") osc.type="sawtooth";
  if(instrument==="reed") osc.type="square";
  if(instrument==="pipe") osc.type="sine";
  if(instrument==="beat") osc.type="square";

  gain.gain.value = volume;
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+1);

  osc.connect(gain);

  applyEQ(gain);

  osc.start();
  osc.stop(ctx.currentTime+1);

  if(recording){
    let t = Date.now()-startTime;
    midiEvents.push({type:"on",note:midi,time:t});
    midiEvents.push({type:"off",note:midi,time:t+300});
  }
}

/* drums */
function drum(freq,name){
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();

  osc.frequency.value=freq;
  osc.type="square";

  gain.gain.value=volume;
  gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime+0.2);
}

/* recording */
function startRecording(){
  midiEvents=[];
  recording=true;
  startTime=Date.now();
}

function stopRecording(){
  recording=false;
}

/* playback */
function playRecording(){
  let start=midiEvents[0]?.time||0;

  midiEvents.forEach(e=>{
    setTimeout(()=>{
      if(e.type==="on"){
        playNote(440,"MIDI",e.note);
      }
    },e.time-start);
  });
}

/* MIDI export */
function downloadMIDI(){

  let data=[];

  midiEvents.forEach(e=>{
    data.push(e.type==="on"?0x90:0x80);
    data.push(e.note);
    data.push(64);
  });

  const header=[
    0x4d,0x54,0x68,0x64,
    0x00,0x00,0x00,0x06,
    0x00,0x01,0x00,0x01,0x00,0x60
  ];

  const track=[
    0x4d,0x54,0x72,0x6b,
    0x00,0x00,0x00,data.length,
    ...data,
    0x00,0xff,0x2f,0x00
  ];

  const midi=new Uint8Array([...header,...track]);

  const blob=new Blob([midi],{type:"audio/midi"});
  const url=URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download="mix.mid";
  a.click();
}

/* MIDI IMPORT */
document.getElementById("midiFile").addEventListener("change", function(e){

  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(evt){

    const midi = MidiParser.parse(evt.target.result);
    midiEvents = [];

    midi.track.forEach(track=>{
      let time = 0;

      track.event.forEach(ev=>{
        time += ev.deltaTime || 0;

        if(ev.type === 9){
          midiEvents.push({type:"on", note:ev.data[0], time: time*10});
        }
        if(ev.type === 8){
          midiEvents.push({type:"off", note:ev.data[0], time: time*10});
        }
      });
    });

    alert("MIDI Imported!");
  };

  reader.readAsArrayBuffer(file);
});
</script>

</body>
</html>
