    <title>QR Card</title>
    <style>
  body {
    background-color: #24809c; /* Light green background */
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
  }

  .container {
    background-color: #fff;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    max-width: 700px;
    width: 90%;
    text-align: center;
  }

  h1 {
    font-size: 2em;
    text-decoration: underline;
    font-weight: bold;
    margin-bottom: 20px;
    color: #333;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 30px;
  }

  th, td {
    border: 1px solid #ccc;
    padding: 15px;
    font-size: 1em;
    text-align: center;
    vertical-align: top;
  }

  th {
    background-color: #f4f4f4;
    font-weight: bold;
  }

  img {
    max-width: 220px; /* Smaller size for better fit on mobile */
    width: 100%;
    height: auto;
    display: block;
    margin: 0 auto 10px auto;
  }

  .exit-button {
    display: inline-block;
    background-color: #868f30;
    color: #000;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 1.1em;
    cursor: pointer;
    text-decoration: none;
    transition: background-color 0.3s, transform 0.2s;
  }

  .exit-button:hover {
    background-color: #414327;
    transform: scale(1.05);
  }

  @media(max-width: 480px) {
    h1 {
      font-size: 1.5em;
    }
    th, td {
      padding: 10px;
      font-size: 0.9em;
    }
    .exit-button {
      padding: 10px 20px;
      font-size: 1em;
    }
    img {
      max-width: 80px;
    }
  }
</style>
