<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Analog Clock</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
    }

    h1 {
      color: white;
      margin-bottom: 20px;
    }

    /* Clock styles */
    .clock {
      height: 20vh;
      color: white;
      font-size: 22vh;
      font-family: sans-serif;
      line-height: 20.4vh;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    .clock::before, .clock::after {
      content: '';
      width: 7ch;
      height: 3vh;
      background: linear-gradient(to top, transparent, black);
      position: absolute;
      z-index: 2;
    }

    .clock::after {
      bottom: 0;
      background: linear-gradient(to bottom, transparent, black);
    }

    .clock > div {
      display: flex;
    }

    .tick {
      line-height: 17vh;
    }

    .tick-hidden {
      opacity: 0;
    }

    .move {
      animation: move linear 1s infinite;
    }

    @keyframes move {
      from {
        transform: translateY(0vh);
      }
      to {
        transform: translateY(-20vh);
      }
    }

    /* Exit container styles */
    .exit-container {
      margin-top: 20px;
    }

    .exit-link {
      color: white;
      text-decoration: none;
      font-size: 1.2em;
      padding: 8px 16px;
      background-color: #333;
      border-radius: 4px;
    }

    /* Button styles */
    #formatToggle {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1em;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background-color: #555;
      color: white;
    }
    #formatToggle:hover {
      background-color: #777;
    }
  </style>
</head>
<body>
  <h1>Analog Clock</h1>

  <div class="clock">
    <div class="hours">
      <div class="first">
        <div class="number">0</div>
      </div>
      <div class="second">
        <div class="number">0</div>
      </div>
    </div>
    <div class="tick">:</div>
    <div class="minutes">
      <div class="first">
        <div class="number">0</div>
      </div>
      <div class="second">
        <div class="number">0</div>
      </div>
    </div>
    <div class="tick">:</div>
    <div class="seconds">
      <div class="first">
        <div class="number">0</div>
      </div>
      <div class="second infinite">
        <div class="number">0</div>
      </div>
    </div>
  </div>

  <div class="exit-container">
    <a href="../../your%20favorite.html" class="exit-link">exit</a>
  </div>

  <button id="formatToggle">Switch to 12-hour</button>

  <script>
    // Select elements
    const hoursContainer = document.querySelector('.hours');
    const minutesContainer = document.querySelector('.minutes');
    const secondsContainer = document.querySelector('.seconds');
    const tickElements = Array.from(document.querySelectorAll('.tick'));
    const toggleButton = document.getElementById('formatToggle');

    // State to keep track of 12/24-hour format
    let is24HourFormat = true;

    // Last date object for comparison
    var last = new Date(0);
    last.setUTCHours(-1);

    // Function to update the clock
    function updateTime() {
      const now = new Date();

      let hours = now.getHours();
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();

      if (!is24HourFormat) {
        hours = hours % 12;
        if (hours === 0) hours = 12;
      }

      // Update hours
      updateContainer(hoursContainer, hours);
      // Update minutes
      updateContainer(minutesContainer, minutes);
      // Update seconds
      updateContainer(secondsContainer, seconds);

      last = now;
    }

    // Function to toggle between 12/24 hour formats
    toggleButton.addEventListener('click', () => {
      is24HourFormat = !is24HourFormat;
      toggleButton.textContent = is24HourFormat ? 'Switch to 12-hour' : 'Switch to 24-hour';
      updateTime(); // update immediately after toggle
    });

    // Function to update container with new time
    function updateContainer(container, newTime) {
      const timeStr = newTime.toString().padStart(2, '0');
      const timeDigits = timeStr.split('');

      const first = container.firstElementChild;
      const last = container.lastElementChild;

      if (first.lastElementChild.textContent !== timeDigits[0]) {
        updateNumber(first, timeDigits[0]);
      }
      if (last.lastElementChild.textContent !== timeDigits[1]) {
        updateNumber(last, timeDigits[1]);
      }
    }

    // Function to animate number change
    function updateNumber(element, number) {
      const second = element.lastElementChild.cloneNode(true);
      second.textContent = number;

      element.appendChild(second);
      element.classList.add('move');

      setTimeout(() => {
        element.classList.remove('move');
      }, 990);
      setTimeout(() => {
        element.removeChild(element.firstElementChild);
      }, 990);
    }

    // Initialize clock
    setInterval(updateTime, 100);
    updateTime(); // initial call
  </script>
</body>
</html>
