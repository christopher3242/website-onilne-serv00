<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ultra Chat</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial;
background:var(--body);
color:var(--text);
display:flex;
flex-direction:column;
height:100vh;
}

/* THEMES */

:root{
--body:#111;
--text:#fff;
--chat:#fff;
--header:#222;
--user:#007bff;
--bot:#e5e5ea;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:var(--header);
flex-wrap:wrap;
}

header h1{
font-size:22px;
}

.controls{
display:flex;
gap:8px;
flex-wrap:wrap;
align-items:center;
}

button{
border:none;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
font-weight:bold;
}

input{
padding:6px;
border-radius:4px;
border:1px solid #ccc;
}

/* EXIT */

#exitBtn{
background:#e74c3c;
color:#fff;
text-decoration:none;
padding:6px 10px;
border-radius:4px;
}

#exitBtn:hover{
background:#c0392b;
}

/* MAIN */

main{
flex:1;
display:flex;
justify-content:center;
padding:10px;
}

/* CHAT */

.chat-container{
width:100%;
max-width:850px;
height:90%;
background:var(--chat);
display:flex;
flex-direction:column;
border-radius:10px;
overflow:hidden;
}

/* CHAT HEADER */

.chat-header{
background:#333;
color:#fff;
padding:10px;
display:flex;
justify-content:space-between;
}

/* MESSAGES */

.chat-messages{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:6px;
}

.message{
max-width:70%;
padding:10px 15px;
border-radius:20px;
font-size:14px;
position:relative;
}

.message.user{
align-self:flex-start;
background:var(--user);
color:#fff;
}

.message.bot{
align-self:flex-end;
background:var(--bot);
color:#000;
}

/* ACTIONS */

.msg-actions{
font-size:10px;
margin-top:3px;
display:flex;
gap:6px;
}

.msg-actions span{
cursor:pointer;
color:#555;
}

/* TIMESTAMP */

.timestamp{
font-size:10px;
opacity:.7;
}

/* INPUT */

.input-area{
display:flex;
gap:6px;
padding:10px;
border-top:1px solid #ddd;
}

#messageInput{
flex:1;
padding:10px;
border-radius:20px;
}

/* EMOJI */

#emojiPanel{
display:none;
flex-wrap:wrap;
gap:6px;
padding:10px;
background:#eee;
}

#emojiPanel span{
cursor:pointer;
font-size:20px;
}

/* TYPING */

#typing{
font-size:12px;
padding:5px 10px;
color:#555;
}

</style>
</head>

<body>

<header>

<h1>Ultra Chat</h1>

<div class="controls">

<button id="user1Btn">User1</button>
<button id="user2Btn">User2</button>

<input id="searchBox" placeholder="Search chat">

<select id="themeSelect"></select>

<button id="renameBtn">Rename</button>
<button id="clearChat">Clear</button>
<button id="exportChat">Export</button>

<a id="exitBtn" href="../../your favorite.html">Exit</a>

</div>

</header>

<main>

<div class="chat-container">

<div class="chat-header">
<span id="currentUser">User 1</span>
<button id="emojiToggle">😊</button>
</div>

<div class="chat-messages" id="messages"></div>

<div id="typing"></div>

<div id="emojiPanel"></div>

<div class="input-area">
<input id="messageInput" placeholder="Type message">
<button id="sendBtn">Send</button>
</div>

</div>

</main>

<script>

/* USERS */

let users={user1:"User 1",user2:"User 2"}
let current="user1"

/* ELEMENTS */

const messages=document.getElementById("messages")
const label=document.getElementById("currentUser")

/* UPDATE USER */

function updateUser(){
label.textContent=users[current]
}

document.getElementById("user1Btn").onclick=()=>{current="user1";updateUser()}
document.getElementById("user2Btn").onclick=()=>{current="user2";updateUser()}

/* TIME */

function time(){
return new Date().toLocaleTimeString([],{
hour:"2-digit",minute:"2-digit"
})
}

/* ADD MESSAGE */

function addMessage(text){

const div=document.createElement("div")

div.className="message "+(current==="user1"?"user":"bot")

div.innerHTML=`
<div class="msgText">${users[current]}: ${text}</div>
<div class="timestamp">${time()}</div>
<div class="msg-actions">
<span class="edit">edit</span>
<span class="delete">delete</span>
</div>
`

messages.appendChild(div)
messages.scrollTop=messages.scrollHeight

saveChat()
}

/* SEND */

function sendMessage(){

const input=document.getElementById("messageInput")

const text=input.value.trim()

if(!text) return

addMessage(text)

input.value=""
}

/* EVENTS */

document.getElementById("sendBtn").onclick=sendMessage

document.getElementById("messageInput").addEventListener("keydown",e=>{
if(e.key==="Enter") sendMessage()
})

/* EDIT DELETE */

messages.addEventListener("click",e=>{

if(e.target.classList.contains("delete")){
e.target.closest(".message").remove()
saveChat()
}

if(e.target.classList.contains("edit")){

const msg=e.target.closest(".message").querySelector(".msgText")

const newText=prompt("Edit message",msg.textContent)

if(newText) msg.textContent=newText

saveChat()
}

})

/* SEARCH */

document.getElementById("searchBox").addEventListener("input",e=>{

const term=e.target.value.toLowerCase()

document.querySelectorAll(".message").forEach(m=>{

m.style.display=
m.innerText.toLowerCase().includes(term)?"":"none"

})

})

/* SAVE */

function saveChat(){
localStorage.setItem("chat",messages.innerHTML)
}

function loadChat(){

const data=localStorage.getItem("chat")

if(data) messages.innerHTML=data
}

loadChat()

/* CLEAR */

document.getElementById("clearChat").onclick=()=>{
messages.innerHTML=""
localStorage.removeItem("chat")
}

/* EXPORT */

document.getElementById("exportChat").onclick=()=>{

const blob=new Blob([messages.innerText],{type:"text/plain"})

const a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="chat.txt"
a.click()

}

/* RENAME */

document.getElementById("renameBtn").onclick=()=>{

const name=prompt("New name")

if(name){
users[current]=name
updateUser()
}

}

/* EMOJI */

const emojis=["😀","😁","😂","🤣","😍","😎","😭","😡","👍","🔥","❤️","🎉"]

const panel=document.getElementById("emojiPanel")

emojis.forEach(e=>{
const s=document.createElement("span")
s.textContent=e
s.onclick=()=>{
document.getElementById("messageInput").value+=e
}
panel.appendChild(s)
})

document.getElementById("emojiToggle").onclick=()=>{
panel.style.display=panel.style.display==="flex"?"none":"flex"
}

/* TYPING */

const typing=document.getElementById("typing")

document.getElementById("messageInput").addEventListener("input",()=>{

typing.textContent=users[current]+" is typing..."

clearTimeout(window.typingTimer)

window.typingTimer=setTimeout(()=>{
typing.textContent=""
},1200)

})

/* THEMES */

const themes=[
["Dark","#111","#fff"],
["Ocean","#001f3f","#fff"],
["Green","#003300","#fff"],
["Pink","#ffc0cb","#000"],
["Purple","#4b0082","#fff"],
["Orange","#ff8c00","#000"],
["Gold","#ffd700","#000"],
["Sky","#87ceeb","#000"],
["Gray","#444","#fff"],
["Teal","#008080","#fff"],
["Rose","#ffe4e1","#000"],
["Mint","#98ff98","#000"],
["Lavender","#e6e6fa","#000"],
["Sun","#fffacd","#000"],
["Forest","#228b22","#fff"],
["Night","#000","#fff"],
["Steel","#708090","#fff"],
["Peach","#ffdab9","#000"],
["Sand","#f4a460","#000"],
["Ice","#e0ffff","#000"]
]

const themeSelect=document.getElementById("themeSelect")

themes.forEach((t,i)=>{
const o=document.createElement("option")
o.value=i
o.textContent=t[0]
themeSelect.appendChild(o)
})

themeSelect.onchange=()=>{

const t=themes[themeSelect.value]

document.documentElement.style.setProperty("--body",t[1])
document.documentElement.style.setProperty("--text",t[2])

}

updateUser()

</script>

</body>
</html>
