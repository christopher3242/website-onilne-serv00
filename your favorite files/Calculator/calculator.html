<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator with Themes & History</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Theme Buttons -->
  <div id="themeButtons">
    <button onclick="setTheme(1)">Theme 1</button>
    <button onclick="setTheme(2)">Theme 2</button>
    <button onclick="setTheme(3)">Theme 3</button>
  </div>

  <!-- Header with Exit Link -->
  <header>
    <a href="../../your%20favorite.html" class="exit-link">Exit</a>
    <h1>Calculator</h1>
  </header>

  <!-- Main container: Calculator + History -->
  <div class="main-container">
    <!-- Calculator -->
    <div class="calculator-container">
      <input id="display" readonly placeholder="0" />
      <div class="buttons-grid">
        <!-- Numeric & Functions -->
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button onclick="appendToDisplay('/')">/</button>

        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button onclick="appendToDisplay('*')">*</button>

        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button onclick="appendToDisplay('-')">-</button>

        <button onclick="appendToDisplay('0')">0</button>
        <button onclick="addDecimal()">.</button>
        <button onclick="calculateResult()" class="equals">=</button>
        <button onclick="appendToDisplay('+')">+</button>

        <!-- Extra functions -->
        <button onclick="clearDisplay()">C</button>
        <button onclick="backspace()">⌫</button>
        <button onclick="appendTrigFunction('cos')">cos(</button>
        <button onclick="appendTrigFunction('sin')">sin(</button>
        <button onclick="appendTrigFunction('tan')">tan(</button>
        <button onclick="appendToDisplay('log(')">log(</button>
        <button onclick="appendToDisplay('log2(')">log₂(</button>
        <button onclick="appendToDisplay('log10(')">log₁₀(</button>
        <button onclick="appendToDisplay('sqrt(')">√</button>
        <button onclick="appendToDisplay('exp(')">exp(</button>
        <button onclick="appendToDisplay('^(')">^</button>
        <button onclick="appendToDisplay('^2')">x²</button>
        <button onclick="appendToDisplay('^0.5')">√</button>
      </div>
    </div>

    <!-- History Panel -->
    <div class="history-container">
      <h3>History</h3>
      <div id="history"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
