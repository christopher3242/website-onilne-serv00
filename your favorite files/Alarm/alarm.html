<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alarm Clock with Multiple Themes</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: var(--bg-color, #f9f9f9);
    margin: 0;
    padding: 20px;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
    box-sizing: border-box;
    transition: background 0.5s ease;
    color: var(--text-color, #222);
  }
  h1 {
    font-size: 2em;
    text-align: center;
    margin-bottom: 10px;
  }
  .clock {
    font-size: 3em;
    text-align: center;
    margin: 10px 0 20px 0;
  }
  .buttons-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  select {
    padding: 10px;
    font-size: 1em;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  /* Themes */
  :root {
    --bg-color: #a1ecff;
    --button-bg: #4A90E2;
    --button-hover: #357ABD;
    --text-color: #222;
    --disabled-bg: #c0c0c0;
  }
  body.theme-green {
    --bg-color: #e0f7e9;
    --button-bg: #66bb6a;
    --button-hover: #388e3c;
    --text-color: #1b5e20;
  }
  body.theme-purple {
    --bg-color: #f3e5f5;
    --button-bg: #ab47bc;
    --button-hover: #8e24aa;
    --text-color: #4a148c;
  }
  body.theme-orange {
    --bg-color: #fff3e0;
    --button-bg: #fb8c00;
    --button-hover: #ef6c00;
    --text-color: #e65100;
  }
  body.theme-sky {
    --bg-color: #87ceeb;
    --button-bg: #3399ff;
    --button-hover: #0077cc;
    --text-color: #222;
  }
  body.theme-vanilla {
    --bg-color: #f3e5ab;
    --button-bg: #8a7c64;
    --button-hover: #d2b48c;
    --text-color: #222;
  }
  body.theme-rose {
    --bg-color: #ffe4e1;
    --button-bg: #ff69b4;
    --button-hover: #cc527f;
    --text-color: #222;
  }
  body.theme-mint {
    --bg-color: #d0f0c0;
    --button-bg: #3eb489;
    --button-hover: #2c9e7d;
    --text-color: #222;
  }

  button {
    padding: 10px 20px;
    font-size: 1em;
    border: none;
    border-radius: 4px;
    background-color: var(--button-bg);
    color: #fff;
    cursor: pointer;
    transition: background-color 0.3s;
  }
  button:hover {
    background-color: var(--button-hover);
  }
  #setAlarmBtn:disabled {
    background: var(--disabled-bg);
    cursor: not-allowed;
  }
  #alarmMsg {
    margin-top: 20px;
    font-size: 1.2em;
    display: none;
    text-align: center;
  }
  /* Theme switcher styles */
  .theme-switcher {
    margin-top: 10px;
    text-align: center;
  }
  label {
    font-weight: bold;
    margin-right: 10px;
    color: var(--text-color);
  }
</style>
</head>
<body class="theme-blue">
<h1>Alarm Clock</h1>
<div class="clock" id="clock">00:00:00</div>

<!-- Format Toggle -->
<div style="text-align:center; margin-bottom:10px;">
  <label for="formatSelect">Time Format:</label>
  <select id="formatSelect">
    <option value="12" selected>12-hour</option>
    <option value="24">24-hour</option>
  </select>
</div>

<!-- Time selectors -->
<div class="buttons-container">
  <select id="hourSelect"></select>
  <select id="minuteSelect"></select>
  <select id="ampmSelect">
    <option value="AM" selected>AM</option>
    <option value="PM">PM</option>
  </select>
</div>

<!-- Alarm controls -->
<div class="buttons-container" style="justify-content: center;">
  <button id="setAlarmBtn">Set Alarm</button>
  <button id="stopAlarmBtn" disabled>Stop Alarm</button>
  <a href="../../your%20favorite.html"><button id="exitBtn">Exit</button></a>
</div>

<!-- Alarm message -->
<div id="alarmMsg">Alarm ringing!</div>

<!-- Theme switcher -->
<div class="theme-switcher">
  <label for="themeSelect">Select Theme:</label>
  <select id="themeSelect">
    <option value="blue" selected>Theme #1 (Blue)</option>
    <option value="green">Theme #2 (Green)</option>
    <option value="purple">Theme #3 (Purple)</option>
    <option value="orange">Theme #4 (Orange)</option>
    <option value="sky">Theme #5 (Sky Blue)</option>
    <option value="vanilla">Theme #6 (Vanilla)</option>
    <option value="rose">Theme #7 (Rose)</option>
    <option value="mint">Theme #8 (Mint)</option>
  </select>
</div>

<!-- Alarm sound -->
<audio id="alarmSound" loop>
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg" />
  Your browser does not support the audio element.
</audio>

<script>
const clock = document.getElementById('clock');
const hourSelect = document.getElementById('hourSelect');
const minuteSelect = document.getElementById('minuteSelect');
const ampmSelect = document.getElementById('ampmSelect');
const setAlarmBtn = document.getElementById('setAlarmBtn');
const stopAlarmBtn = document.getElementById('stopAlarmBtn');
const alarmMsg = document.getElementById('alarmMsg');
const alarmSound = document.getElementById('alarmSound');
const themeSelect = document.getElementById('themeSelect');
const body = document.body;
const formatSelect = document.getElementById('formatSelect');

let alarmTime = null;

// Populate time selectors
function populateTimeSelectors() {
  hourSelect.innerHTML = '';
  minuteSelect.innerHTML = '';

  const format = formatSelect.value;

  if (format === '12') {
    for(let i=1; i<=12; i++) {
      const option = document.createElement('option');
      option.value = i.toString().padStart(2,'0');
      option.text = i.toString().padStart(2,'0');
      hourSelect.appendChild(option);
    }
    ampmSelect.style.display = 'inline-block';
  } else {
    for(let i=0; i<24; i++) {
      const option = document.createElement('option');
      option.value = i.toString().padStart(2,'0');
      option.text = i.toString().padStart(2,'0');
      hourSelect.appendChild(option);
    }
    ampmSelect.style.display = 'none';
  }

  for(let i=0; i<60; i++) {
    const option = document.createElement('option');
    option.value = i.toString().padStart(2,'0');
    option.text = i.toString().padStart(2,'0');
    minuteSelect.appendChild(option);
  }
}

// Initialize selectors
populateTimeSelectors();

formatSelect.addEventListener('change', () => {
  populateTimeSelectors();
});

// Update current time display
function updateTime() {
  const now = new Date();
  let hours = now.getHours();
  const minutes = now.getMinutes();
  const seconds = now.getSeconds();
  let displayHours = hours;
  let ampm = '';

  if (formatSelect.value === '12') {
    ampm = hours >= 12 ? 'PM' : 'AM';
    displayHours = hours % 12;
    displayHours = displayHours ? displayHours : 12; // 0 -> 12
  } else {
    displayHours = hours;
  }

  const timeString = 
    displayHours.toString().padStart(2,'0') + ':' + 
    minutes.toString().padStart(2,'0') + ':' + 
    seconds.toString().padStart(2,'0') + (formatSelect.value==='12' ? ' ' + ampm : '');

  clock.textContent = timeString;

  // Check alarm
  if(alarmTime) {
    checkAlarm();
  }
}
setInterval(updateTime, 1000);
updateTime();

function checkAlarm() {
  const now = new Date();
  let currentHours = now.getHours();
  let currentMinutes = now.getMinutes();

  if (!alarmTime) return;

  if (formatSelect.value === '12') {
    const [timePart, ampm] = alarmTime.split(' ');
    const [alarmHourStr, alarmMinStr] = timePart.split(':');
    let alarmHours = parseInt(alarmHourStr);
    const alarmMinutes = parseInt(alarmMinStr);

    // Convert to 24-hour for comparison
    if (ampm === 'PM' && alarmHours !== 12) alarmHours += 12;
    if (ampm === 'AM' && alarmHours === 12) alarmHours = 0;

    if (currentHours === alarmHours && currentMinutes === alarmMinutes) {
      ringAlarm();
    }
  } else {
    // 24-hour format
    const [alarmHourStr, alarmMinStr] = alarmTime.split(':');
    const alarmHours = parseInt(alarmHourStr);
    const alarmMinutes = parseInt(alarmMinStr);
    if (currentHours === alarmHours && currentMinutes === alarmMinutes) {
      ringAlarm();
    }
  }
}

document.getElementById('setAlarmBtn').addEventListener('click', () => {
  const hour = hourSelect.value;
  const minute = minuteSelect.value;
  const ampm = document.getElementById('ampmSelect').value;
  const format = formatSelect.value;

  if (format === '12') {
    alarmTime = `${hour}:${minute} ${ampm}`;
  } else {
    alarmTime = `${hour}:${minute}`;
  }

  alert(`Alarm set for ${alarmTime}.`);

  setAlarmBtn.disabled = true;
  stopAlarmBtn.disabled = false;
});

document.getElementById('stopAlarmBtn').addEventListener('click', () => {
  stopAlarm();
});

document.getElementById('exitBtn').addEventListener('click', () => {
  resetAlarm();
});

// Theme switching
document.getElementById('themeSelect').addEventListener('change', () => {
  const theme = document.getElementById('themeSelect').value;
  document.body.className = '';
  switch (theme) {
    case 'green': document.body.classList.add('theme-green'); break;
    case 'purple': document.body.classList.add('theme-purple'); break;
    case 'orange': document.body.classList.add('theme-orange'); break;
    case 'sky': document.body.classList.add('theme-sky'); break;
    case 'vanilla': document.body.classList.add('theme-vanilla'); break;
    case 'rose': document.body.classList.add('theme-rose'); break;
    case 'mint': document.body.classList.add('theme-mint'); break;
    default: document.body.classList.add('theme-blue');
  }
});

// Alarm control functions
function ringAlarm() {
  alarmMsg.style.display = 'block';
  alarmSound.currentTime = 0;
  alarmSound.play().catch(() => {
    alert('Audio playback failed. Please allow sound permissions.');
  });
  alarmSound.loop = true;
  document.getElementById('stopAlarmBtn').disabled = false;
}

function stopAlarm() {
  alarmSound.pause();
  alarmSound.currentTime = 0;
  alarmMsg.style.display = 'none';
  alarmTime = null;
  document.getElementById('setAlarmBtn').disabled = false;
  document.getElementById('stopAlarmBtn').disabled = true;
}

function resetAlarm() {
  stopAlarm();
}
</script>
</body>
</html>
