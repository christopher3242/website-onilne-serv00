<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title> Android test Ultimate Diagnostics Pro V3</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0f1c;
  color:#e5e7eb;
}

h1 {
  text-align:center;
  padding:15px;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:10px;
}

.section {
  background:#111827;
  margin:12px 0;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.4);
}

button {
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  margin-top:6px;
}

button:hover {
  background:#3b82f6;
}

canvas {
  background:white;
  border-radius:10px;
  margin-top:10px;
  width:100%;
}

.exit {
  position:fixed;
  top:15px;
  right:15px;
  background:#ef4444;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  color:white;
  text-decoration: none; /* Ensures link looks like button */
  font-weight: bold;
}

.exit:hover {
  background:#dc2626;
}

.small {
  font-size:13px;
  opacity:0.8;
}
</style>
</head>

<body>

<h1>🔥 Diagnostics Pro V3 Android  Test </h1>
<a href="../../your%20favorite.html" class="exit">exit</a>
<div class="container">

<!-- DEVICE -->
<div class="section">
<h2>📱 Device Core Info</h2>
<p>User Agent: <span id="ua"></span></p>
<p>Platform: <span id="platform"></span></p>
<p>Language: <span id="lang"></span></p>
<p>Cores: <span id="cores"></span></p>
<p>RAM: <span id="ram"></span></p>
</div>

<!-- CHARTS -->
<div class="section">
<h2>📊 Live System Graphs</h2>
<canvas id="cpuChart"></canvas>
<canvas id="batteryChart"></canvas>
</div>

<!-- PERFORMANCE -->
<div class="section">
<h2>⚡ Performance Benchmarks</h2>

<button onclick="cpuTest()">Run CPU Benchmark</button>
<p id="cpuOut"></p>

<button onclick="gpuTest()">Run GPU Benchmark</button>
<p id="gpuOut"></p>

<button onclick="netTest()">Network Speed Test</button>
<p id="netOut"></p>
</div>

<!-- GPS -->
<div class="section">
<h2>📍 Location Services</h2>
<button onclick="gps()">Get Location</button>
<p id="gpsOut"></p>
<a id="map" target="_blank"></a>
</div>

<!-- SENSORS -->
<div class="section">
<h2>📡 Live Sensors</h2>
<p>Accelerometer: <span id="acc"></span></p>
<p>Gyroscope: <span id="gyro"></span></p>
</div>

<!-- BATTERY -->
<div class="section">
<h2>🔋 Battery Monitor</h2>
<p>Status: <span id="bat"></span></p>
</div>

</div>

<script>

// ================= DEVICE INFO =================
const $ = id => document.getElementById(id);

$("ua").textContent = navigator.userAgent;
$("platform").textContent = navigator.platform || "Unknown";
$("lang").textContent = navigator.language;
$("cores").textContent = navigator.hardwareConcurrency || "N/A";
$("ram").textContent = navigator.deviceMemory || "N/A";

// ================= CHARTS =================
const cpuChart = new Chart(document.getElementById("cpuChart"), {
 type:"line",
 data:{labels:[], datasets:[{label:"CPU Load %", data:[]}]}
});

const batteryChart = new Chart(document.getElementById("batteryChart"), {
 type:"line",
 data:{labels:[], datasets:[{label:"Battery %", data:[]}]}
});

// ================= LIVE LOOP =================
setInterval(async () => {
 const t = new Date().toLocaleTimeString();

 cpuChart.data.labels.push(t);
 cpuChart.data.datasets[0].data.push(Math.random()*100);
 cpuChart.update();

 if(navigator.getBattery){
  const b = await navigator.getBattery();
  batteryChart.data.labels.push(t);
  batteryChart.data.datasets[0].data.push(b.level*100);
  batteryChart.update();
  $("bat").textContent = (b.level*100).toFixed(0) + "%";
 }
}, 2000);

// ================= CPU BENCH =================
function cpuTest(){
 const start = performance.now();
 let x = 0;
 for(let i=0;i<8e7;i++) x += i;
 const end = performance.now();
 $("cpuOut").textContent = (end-start).toFixed(2)+" ms";
}

// ================= GPU BENCH =================
function gpuTest(){
 const c = document.createElement("canvas");
 const gl = c.getContext("webgl");

 if(!gl){
  $("gpuOut").textContent = "WebGL not supported";
  return;
 }

 const start = performance.now();
 for(let i=0;i<8000;i++){
  gl.clear(gl.COLOR_BUFFER_BIT);
 }
 const end = performance.now();

 $("gpuOut").textContent = (end-start).toFixed(2)+" ms";
}

// ================= NETWORK TEST =================
async function netTest(){
 const url = "https://upload.wikimedia.org/wikipedia/commons/3/3f/Fronalpstock_big.jpg";
 const start = performance.now();
 const r = await fetch(url);
 await r.blob();
 const end = performance.now();

 const sec = (end-start)/1000;
 const speed = (5/sec).toFixed(2);

 $("netOut").textContent = speed + " MB/s (approx)";
}

// ================= GPS =================
function gps(){
 navigator.geolocation.getCurrentPosition(p=>{
  const lat = p.coords.latitude;
  const lon = p.coords.longitude;

  $("gpsOut").textContent = `Lat: ${lat}, Lon: ${lon}`;

  $("map").href = `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}`;
  $("map").textContent = "Open Map";
 });
}

// ================= SENSORS =================
window.addEventListener("devicemotion", e=>{
 if(e.acceleration){
  $("acc").textContent =
  JSON.stringify(e.acceleration).slice(0,60);
 }
});

window.addEventListener("deviceorientation", e=>{
 $("gyro").textContent =
 `α:${e.alpha?.toFixed(1)} β:${e.beta?.toFixed(1)} γ:${e.gamma?.toFixed(1)}`;
});

</script>

</body>
</html>
