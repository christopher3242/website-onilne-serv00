<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video List with Counter</title>
  <style>
    body {
      background-color: #78c0d6; /* Light blue background */
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    h1 {
      text-align: center;
      font-size: 2.5em;
      margin-bottom: 20px;
    }

    /* Table styling */
    table {
      width: 100%;
      max-width: 1046px;
      margin: 0 auto 20px auto;
      border-collapse: collapse;
      background-color: #ffffff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    td {
      padding: 12px 20px;
      border: 1px solid #a8a8a8;
      text-align: center;
      font-size: 1em;
    }

    /* Container for the download button at bottom left with full space around */
    .bottom-left-container {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      padding: 20px;
      margin-top: auto;
    }

    /* Style for the download button */
    .download-button {
      display: inline-block;
      padding: 14px 28px;
      font-size: 1.2em;
      font-weight: bold;
      text-decoration: none;
      background-color: #269ee4;
      color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s;
    }

    /* Hover and focus effects for the button */
    .download-button:hover,
    .download-button:focus {
      background-color: #4061ce;
      transform: scale(1.05);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
      outline: none;
    }

    /* Additional styling for exit link container */
    .exit-container {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      padding: 10px 20px;
    }

    /* Style for the exit link */
    .exit-link {
      text-decoration: none;
      background-color: #4759ff;
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      font-weight: bold;
      transition: background-color 0.3s, transform 0.2s;
    }

    .exit-link:hover,
    .exit-link:focus {
      background-color: #121464;
      transform: scale(1.05);
      outline: none;
    }
  </style>
</head>
<body>
  <br>
  <div align="center">
    <h1 style="font-family: 'Arial Rounded MT'; font-size: 2.5em;">xxxsexy serv00 = Video ID</h1>
    <p style="font-size: 1.2em;">I will download PDF Only or view</p>
  </div>
  <!-- Download PDF Button -->
  <div class="download-container" style="text-align: center; margin-top: 30px;">
    <a
      href="https://file.garden/Zyu3f9V1JUxg3Fw-/webiste%20%20onilne%20(Github)/Video%20ID/videos%20list.pdf"
      class="download-button"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Download Video List PDF"
    >
      Download PDF
    </a>
  </div>
  <!-- Exit link at the bottom right -->
  <div class="exit-container">
    <a href="../../your%20favorite.html" class="exit-link">exit</a>
  </div>
</body>
</html>
