<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video List with Counter</title>
  <style>
    body {
      background-color: #78c0d6; /* Light blue background */
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header h1 {
      font-family: 'Arial Rounded MT', Arial, sans-serif;
      font-size: 2.5em;
      margin: 0;
    }

    /* Main content styling */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Table styling */
    table {
      width: 100%;
      max-width: 1046px;
      border-collapse: collapse;
      background-color: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      margin-bottom: 20px;
    }

    th, td {
      padding: 12px 20px;
      border: 1px solid #a8a8a8;
      text-align: center;
      font-size: 1em;
    }

    /* Download button container */
    .download-section {
      width: 100%;
      max-width: 1046px;
      display: flex;
      justify-content: flex-start;
      padding: 20px;
    }

    /* Download button styling */
    .download-button {
      text-decoration: none;
      background-color: #269ee4;
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      font-weight: bold;
      transition: background-color 0.3s, transform 0.2s;
    }

    .download-button:hover {
      background-color: #4061ce;
      transform: scale(1.05);
    }

    /* Exit link container */
    .exit-container {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      padding: 10px 20px;
    }

    /* Exit link styling */
    .exit-link {
      text-decoration: none;
      background-color: #4759ff;
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      font-weight: bold;
      transition: background-color 0.3s, transform 0.2s;
    }

    .exit-link:hover {
      background-color: #121464;
      transform: scale(1.05);
    }

    /* Additional styling for decorative text */
    .title-section {
      text-align: center;
      font-family: 'Arial Rounded MT', Arial, sans-serif;
      font-size: 2em;
      margin-bottom: 20px;
    }

  </style>
</head>
<body>
  <header>
    <h1>xxxsexy serv00 = Video ID</h1>
  </header>
  <main>
    <section class="title-section">
      <p>I will download PDF Only or view</p>
    </section>

    <!-- Video List Table (Placeholder, add your rows as needed) -->
    <table>
      <thead>
        <tr>
          <th>Video Title</th>
          <th>Duration</th>
          <th>Size</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- Example row -->
        <tr>
          <td>Sample Video 1</td>
          <td>3:45</td>
          <td>25MB</td>
          <td>
            <a href="#" class="download-button" target="_blank" download>Download</a>
          </td>
        </tr>
        <!-- Add more rows as needed -->
      </tbody>
    </table>

    <!-- Download PDF Button -->
    <div class="download-section">
      <a
        href="https://file.garden/Zyu3f9V1JUxg3Fw-/webiste%20%20onilne%20(Github)/Video%20ID/videos%20list.pdf"
        class="download-button"
        target="_blank"
        download
        aria-label="Download Video List PDF"
      >
        Download PDF
      </a>
    </div>
  </main>

  <!-- Exit link at bottom right -->
  <div class="exit-container">
    <a href="../../your%20favorite.html" class="exit-link" aria-label="Exit to your favorite page">Exit</a>
  </div>
</body>
</html>
