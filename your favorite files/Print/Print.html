<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Print, Exit & Time Format Toggle Buttons</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 50px;
  }
  button {
    display: inline-block;
    padding: 10px 20px;
    font-size: 16px;
    margin: 10px;
    cursor: pointer;
    border: none;
    background-color: #4CAF50;
    color: white;
    border-radius: 5px;
  }
  button:hover {
    background-color: #45a049;
  }
  #time {
    font-weight: bold;
  }
</style>
</head>
<body>
<h1>Printing Testing</h1>
<!-- Static label for time -->
<p>Time: <span id="time"></span></p>
<h2>
  Hello,My name xxxsexy , You can do it and Testing will make you ( :O )<br>
</h2>

<!-- Buttons -->
<button id="printButton">Print</button>
<button id="exitButton" onclick="window.location.href='../../your%20favorite.html'">Exit</button>
<button id="toggleFormatButton">Switch to 24-hour</button>

<script>
  let is24HourFormat = false;

  function updateTime() {
    const now = new Date();
    let options = {
      hour: 'numeric',
      minute: 'numeric',
      second: 'numeric',
    };
    if (is24HourFormat) {
      options.hour12 = false;
    } else {
      options.hour12 = true;
    }
    document.getElementById('time').textContent = 'Current time: ' + now.toLocaleString(undefined, options);
  }

  // Initialize time display
  updateTime();

  // Update time every second
  setInterval(updateTime, 1000);

  // Toggle time format button
  document.getElementById('toggleFormatButton').addEventListener('click', function() {
    is24HourFormat = !is24HourFormat;
    this.textContent = is24HourFormat ? 'Switch to 12-hour' : 'Switch to 24-hour';
    updateTime();
  });

  // Print button event
  document.getElementById('printButton').addEventListener('click', function() {
    // Hide buttons before printing
    document.querySelectorAll('button').forEach(btn => btn.style.display = 'none');

    // Trigger print dialog
    window.print();

    // Show buttons again after print
    setTimeout(() => {
      document.querySelectorAll('button').forEach(btn => btn.style.display = 'inline-block');
    }, 1000);
  });
</script>
</body>
</html>
