<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soundcloud Playlists</title>
<style>
  body {
    background-color: #375f9c;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
  }

  h1 {
    color: #ffffff;
    text-align: center;
    margin-bottom: 20px;
    font-size: 2em;
  }

  /* Responsive iframes */
  iframe {
    width: 100%;
    height: 450px;
    border: none;
    border-radius: 8px;
    margin: 20px 0;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  iframe:hover {
    transform: scale(1.02);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
  }

  /* Caption styles */
  .caption {
    font-size: 10px;
    color: #cccccc;
    font-family: Interstate, Lucida Grande, Lucida Sans Unicode, Lucida Sans, Garuda, Verdana, Tahoma, sans-serif;
    font-weight: 100;
    margin: 5px 0;
  }

  /* Links inside caption */
  .caption a {
    color: #cccccc;
    text-decoration: none;
  }

  /* Responsive font size for small screens */
  @media(max-width: 600px){
    h1 {
      font-size: 1.5em;
    }
    .caption {
      font-size: 8px;
    }
  }
</style>
</head>
<body>
