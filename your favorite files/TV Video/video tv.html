<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Custom Video Player with Audio and Captions</title>
  <!-- Video.js CSS -->
  <link href="https://vjs.zencdn.net/7.18.1/video-js.css" rel="stylesheet" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(240deg,rgba(69, 69, 117, 1) 36%, rgba(99, 144, 176, 1) 100%);
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .video-container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      color: #fff;
    }

    #videoPlayer {
      width: 100% !important;
      height: auto !important;
      border: 0.8px solid #87bfff;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
    }

    #videoNumber {
      margin-top: 10px;
      font-size: 1.2em;
      font-weight: bold;
      color: #fff;
    }

    .button-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    button {
      margin: 6px;
      padding: 12px 20px;
      font-size: 1em;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #144496;
      color: #fff;
      transition: background-color 0.3s, opacity 0.5s;
    }

    button:hover {
      background-color: #152C54;
    }

    /* Hidden class for hiding buttons */
    .hidden {
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    /* Make controls touch-friendly */
    @media (max-width: 600px) {
      button {
        padding: 10px 16px;
        font-size: 0.9em;
      }
    }

    /* Additional styling for controls */
    .controls-section {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .controls-section > * {
      margin: 5px 0;
    }

    select,
    input[type="number"],
    input[type="text"] {
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 1em;
    }
  </style>
</head>

    </video>
    <div class="button-container">
      <button id="prev" class="hidden" onclick="prevVideo()">Back</button>
      <button id="random" onclick="randomVideo()">Random</button>
      <button id="next" class="hidden" onclick="nextVideo()">Next</button>
      <button id="search" onclick="searchVideo()">Search Video</button>
      <a href="../../your%20favorite.html">
        <button id="exit">Exit</button>
      </a>
    </div>

    <!-- Controls for custom playback rate -->
    <div class="controls-section">
      <label for="playbackRateSelect">Set Playback Rate:</label>
      <select id="playbackRateSelect" onchange="setPlaybackRate(this.value)">
        <option value="0.5">0.5x</option>
        <option value="1" selected>1x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
        <option value="0">Custom Rate</option>
      </select>
      <div id="customRateContainer" style="margin-top: 5px; display: none">
        <input
          type="number"
          id="customRateInput"
          min="0"
          max="10"
          step="0.1"
          placeholder="Enter rate (0-10)"
        />
        <button onclick="applyCustomRate()">Apply</button>
      </div>
    </div>

    <!-- Search input for video number -->
    <div class="controls-section" style="margin-top: 20px">
      <label for="videoNumberInput">Search Video Number (1-8500):</label>
      <input type="number" id="videoNumberInput" min="1" max="8500" />
      <button onclick="searchVideoByInput()">Go</button>
    </div>

    <!-- Video.js JS -->
    <script src="https://vjs.zencdn.net/7.18.1/video.min.js"></script>
    <script>
      const videoNumberDisplay = document.getElementById("videoNumber");
      let currentVideoIndex = 0;

      // Generate video sources from 1 to 8500
      const videoSources = [];
      for (let i = 1; i <= 8500; i++) {
        videoSources.push(`video${i}.mp4`);
      }

      const videoPlayer = videojs("videoPlayer", {
        controls: true,
        preload: "auto",
        fluid: true,
        controlBar: {
          fullscreenToggle: true,
          pictureInPictureToggle: true,
        },
        playbackRates: [0.5, 1, 1.5, 2],
      });

      function updateButtonVisibility() {
        document
          .getElementById("prev")
          .classList.toggle("hidden", currentVideoIndex === 0);
        document
          .getElementById("next")
          .classList.toggle(
            "hidden",
            currentVideoIndex === videoSources.length - 1
          );
      }

      function updateVideo() {
        const src = videoSources[currentVideoIndex];
        videoPlayer.src({ type: "video/mp4", src: src });
        videoPlayer.load();
        videoPlayer.play();
        updateButtonVisibility();
        updateVideoNumber();
      }

      function updateVideoNumber() {
        document.getElementById("videoNumber").textContent = `Video ${
          currentVideoIndex + 1
        }`;
      }

      function prevVideo() {
        if (currentVideoIndex > 0) {
          currentVideoIndex--;
          updateVideo();
        }
      }

      function nextVideo() {
        if (currentVideoIndex < videoSources.length - 1) {
          currentVideoIndex++;
          updateVideo();
        }
      }

      function randomVideo() {
        currentVideoIndex = Math.floor(Math.random() * videoSources.length);
        updateVideo();
      }

      function searchVideo() {
        const input = prompt("Enter video number (1-8500):");
        const num = parseInt(input);
        if (!isNaN(num) && num >= 1 && num <= 8500) {
          currentVideoIndex = num - 1;
          updateVideo();
        } else {
          alert("Invalid number. Please enter a number between 1 and 8500.");
        }
      }

      // Search by input box
      function searchVideoByInput() {
        const numInput = document.getElementById("videoNumberInput").value;
        const num = parseInt(numInput);
        if (!isNaN(num) && num >= 1 && num <= 8500) {
          currentVideoIndex = num - 1;
          updateVideo();
        } else {
          alert("Invalid number. Please enter a number between 1 and 8500.");
        }
      }

      // Set playback rate from dropdown
      function setPlaybackRate(rate) {
        if (rate === "0") {
          // Show custom rate input
          document.getElementById("customRateContainer").style.display =
            "block";
        } else {
          document.getElementById("customRateContainer").style.display = "none";
          const numRate = parseFloat(rate);
          if (!isNaN(numRate)) {
            videoPlayer.playbackRate(numRate);
          }
        }
      }

      // Apply custom rate from input box
      function applyCustomRate() {
        const rateInput = document.getElementById("customRateInput").value;
        const rate = parseFloat(rateInput);
        if (!isNaN(rate) && rate >= 0 && rate <= 10) {
          videoPlayer.playbackRate(rate);
        } else {
          alert("Invalid rate. Please enter a number between 0 and 10.");
        }
      }

      // Initialize with the first video
      updateVideo();

      // Handle initial display of custom rate input if '0' is selected
      document
        .getElementById("playbackRateSelect")
        .addEventListener("change", function () {
          setPlaybackRate(this.value);
        });
    </script>
